<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono Rallye Race — AZRALLYEGAME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#0e1013; --card:#15181d; --card2:#1a1e24; --line:#2a2f37;
    --fog:#8b929c; --paper:#eceef1; --amber:#fbbf24; --amber-soft:#ffd77a;
    --red:#dc2626; --red-hi:#ef4444; --green:#4ade80; --err:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--asphalt);color:var(--paper);font-family:"Space Mono",monospace;min-height:100vh;
    background-image:radial-gradient(circle at 20% 8%,rgba(251,191,36,.06),transparent 42%),
                     radial-gradient(circle at 92% 92%,rgba(220,38,38,.05),transparent 45%);
    padding-bottom:60px}
  /* quand la barre de validation est affichée, laisser la place en bas */
  body.hasbar{padding-bottom:130px}
  @media(max-width:600px){body.hasbar{padding-bottom:170px}}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}

  header{border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:14px;
    flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,19,.95);z-index:50}
  header .in{max-width:1040px;margin:0 auto;width:100%;display:flex;align-items:center;gap:14px}
  .mark{font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:18px}
  .mark span{color:var(--amber)}
  .tag{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);
    border-left:1px solid var(--line);padding-left:14px}
  .usr{margin-left:auto;font-size:11px;color:var(--fog);letter-spacing:.06em;text-transform:uppercase}
  .usr b{color:var(--amber)}
  .usr a{color:var(--fog);text-decoration:none;margin-left:12px;border-bottom:1px solid var(--line)}
  .usr a:hover{color:var(--amber)}

  .onglets{display:flex;gap:0;border-bottom:1px solid var(--line);margin-top:6px}
  .og{font-family:"Oswald",sans-serif;font-weight:600;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;padding:14px 22px;cursor:pointer;color:var(--fog);
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:.14s}
  .og:hover{color:var(--paper)}
  .og.on{color:var(--amber);border-bottom-color:var(--amber)}
  .chwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chtab{width:auto;min-width:100%;border-collapse:collapse;font-size:13px}
  .chtab th,.chtab td{padding:10px 8px;border-bottom:1px solid #23272e;white-space:nowrap;text-align:center}
  .chtab thead th{font-family:"Oswald",sans-serif;font-weight:500;text-transform:uppercase;
    letter-spacing:.1em;font-size:10px;color:var(--fog);border-bottom:1px solid var(--line)}
  .chtab .c0{width:26px}
  .chtab .c1{text-align:left;position:sticky;left:0;background:var(--card);z-index:2;min-width:110px}
  .chtab .c2{font-family:"Oswald",sans-serif;font-weight:700;color:var(--amber);
    position:sticky;left:110px;background:var(--card);z-index:2}
  .chtab thead .c1,.chtab thead .c2{background:var(--card)}
  .chtab .rc{color:var(--fog);min-width:42px}
  .chtab tr.me .c1,.chtab tr.me td{background:#1d1a12}
  .chtab tr.me .c1{color:var(--amber)}
  .chtab .p{color:var(--fog);font-weight:700}
  .cr.clic{cursor:pointer}
  .cr.clic:hover{background:#1e232a}
  .cgo{color:var(--amber);font-family:"Oswald",sans-serif;font-weight:700;flex-shrink:0;margin-left:2px}
  h2.sec{font-family:"Oswald",sans-serif;font-weight:600;font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--fog);margin:30px 0 12px;display:flex;align-items:center;gap:12px}
  h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}

  .panel{background:var(--card);border:1px solid var(--line);padding:18px}
  .msg{padding:11px 14px;border:1px solid var(--line);margin:16px 0;font-size:13px;color:var(--fog)}
  .msg.err{border-color:var(--red);color:var(--err)}
  .msg.ok{border-color:var(--green);color:var(--green)}

  /* HERO */
  .hero{border:1px solid var(--line);border-left:4px solid var(--amber);background:var(--card);
    padding:24px;margin-top:24px}
  .hero .kick{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .hero h1{font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(20px,3.4vw,30px);
    letter-spacing:.02em;line-height:1.1}
  .hero .meta{display:flex;flex-wrap:wrap;gap:6px 20px;color:var(--fog);font-size:12px;margin-top:10px}
  .hero .meta b{color:var(--paper)}
  .stats{display:flex;flex-wrap:wrap;gap:26px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
  .ecu{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .ecuh{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--fog);margin-bottom:10px}
  .eq{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid #23272e;font-size:13px}
  .eq:last-child{border-bottom:none}
  .eqn{font-family:"Oswald",sans-serif;font-weight:700;font-size:12px;color:var(--amber);
    width:64px;flex-shrink:0}
  .eqp{flex:1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .eqi{font-size:11px;color:var(--fog);flex-shrink:0;white-space:nowrap}
  .st .k{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fog)}
  .st .v{font-family:"Oswald",sans-serif;font-weight:700;font-size:24px;margin-top:3px}
  .st .v.amber{color:var(--amber)}
  .st .s{font-size:11px;color:var(--fog);margin-top:2px}

  .btn{font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:14px;
    padding:13px 26px;border:2px solid var(--red-hi);background:var(--red);color:#fff;cursor:pointer;transition:.15s}
  .btn:hover:not(:disabled){background:var(--red-hi)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--fog);padding:9px 16px;font-size:12px}
  .btn.ghost:hover{border-color:var(--amber);color:var(--amber);background:transparent}

  /* budget */
  .bud{display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:58px;z-index:40;
    background:var(--card);border:1px solid var(--line);padding:13px 18px;margin:14px 0}
  .bud .k{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fog)}
  .bud .v{font-family:"Oswald",sans-serif;font-weight:700;font-size:23px}
  .bud .v .u{color:var(--amber)} .bud .v .m{color:var(--fog);font-size:14px}
  .bar{flex:1;min-width:150px;height:8px;background:#0c0e12;border:1px solid var(--line)}
  .bar>span{display:block;height:100%;width:0;background:var(--amber);transition:width .25s}

  /* slots */
  .slots{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:760px){.slots{grid-template-columns:repeat(2,1fr)}}
  .slot{border:1px dashed var(--line);background:var(--card);padding:12px;min-height:96px;
    display:flex;flex-direction:column;position:relative}
  .slot.on{border-style:solid;background:var(--card2)}
  .slot.on.car{border-color:var(--amber)}
  .slot .r{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fog)}
  .slot .h{font-size:11px;color:#5b616b;margin-top:auto}
  .slot .n{font-size:13px;font-weight:700;margin-top:7px;line-height:1.25;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .s{font-size:11px;color:var(--fog);margin-top:2px}
  .slot .b{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:6px}
  .slot .c{font-family:"Oswald",sans-serif;font-weight:700;font-size:15px;color:var(--amber)}
  .slot .x{position:absolute;top:7px;right:7px;width:20px;height:20px;border:1px solid var(--line);
    background:transparent;color:var(--fog);cursor:pointer;font-size:12px;line-height:1}
  .slot .x:hover{color:var(--red-hi);border-color:var(--red-hi)}

  .chip{display:inline-block;font-family:"Oswald",sans-serif;font-weight:600;font-size:10px;letter-spacing:.08em;
    padding:2px 7px;text-transform:uppercase;border:1px solid var(--line);color:var(--fog)}
  .chip.cl{border-color:var(--amber);color:var(--amber)}
  .chip.ab{border-color:var(--red);color:var(--err)}

  /* jauge bonus/malus */
  .cbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .ci{border:1px solid var(--line);background:var(--card);padding:7px 11px;font-size:11px;color:var(--fog);
    display:flex;align-items:center;gap:8px}
  .g{display:flex;gap:2px}
  .g i{width:4px;height:11px;background:#2b3038;display:block}
  .g i.on{background:var(--amber)}
  .g.low i.on{background:#5b616b}
  .lvl{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .lvl.hi{color:var(--amber)}

  /* cards */
  .grp{margin-bottom:4px}
  .gh{display:flex;align-items:center;gap:10px;margin:16px 0 9px;flex-wrap:wrap}
  .gh .n{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.12em;color:var(--fog)}
  .gh .lk{margin-left:auto;font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--err);display:none}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(226px,1fr));gap:8px}
  .card-i{background:var(--card);border:1px solid var(--line);padding:11px 13px;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;gap:10px;transition:.14s}
  .card-i:hover{border-color:var(--amber-soft)}
  .card-i .n{font-size:13px;font-weight:700;line-height:1.25}
  .card-i .n small{display:block;color:var(--fog);font-weight:400;font-size:11px;margin-top:2px}
  .card-i .c{font-family:"Oswald",sans-serif;font-weight:700;font-size:17px;color:var(--amber)}
  .card-i.sel{border-color:var(--amber);background:#1d1a12}
  .card-i.lock{opacity:.3;cursor:not-allowed}
  .card-i.lock:hover{border-color:var(--line)}

  .vbar{position:fixed;bottom:0;left:0;right:0;background:rgba(14,16,19,.97);border-top:1px solid var(--line);
    padding:13px 20px;z-index:60}
  .vin{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .vst{font-size:12px;color:var(--fog)}.vst b{color:var(--paper)}

  /* jokers */
  .jks{display:flex;gap:11px;flex-wrap:wrap}
  .jk{position:relative;width:62px;height:62px;border:1px solid var(--line);background:var(--card2);
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .jk:hover{border-color:var(--amber)}
  .jk svg{width:27px;height:27px;stroke:var(--fog);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .jk:hover svg,.jk.sel svg{stroke:var(--amber)}
  .jk.sel{border-color:var(--amber);background:#1d1a12}
  .jk.used{opacity:.28;cursor:not-allowed;filter:grayscale(1)}
  .jk.used:hover{border-color:var(--line)}
  .jk .bd{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);font-family:"Oswald",sans-serif;
    font-size:8px;letter-spacing:.08em;background:var(--asphalt);border:1px solid var(--line);color:var(--fog);
    padding:1px 5px;white-space:nowrap}
  .tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);width:205px;
    background:#0a0c0f;border:1px solid var(--line);padding:10px 12px;opacity:0;visibility:hidden;
    transition:.15s;z-index:70;pointer-events:none}
  .jk:hover .tip,.jk.show .tip{opacity:1;visibility:visible}
  .tip .t{font-family:"Oswald",sans-serif;font-weight:700;font-size:12px;color:var(--amber);text-transform:uppercase;letter-spacing:.06em}
  .tip .d{font-size:11px;color:var(--fog);line-height:1.4;margin-top:4px}

  .pick{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .pick .l{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);margin-bottom:9px}
  .row{display:flex;gap:7px;flex-wrap:wrap}
  .sc{min-width:56px;padding:8px 10px;border:1px solid var(--line);background:var(--card2);cursor:pointer;text-align:center}
  .sc:hover{border-color:var(--amber-soft)}
  .sc .c{font-family:"Oswald",sans-serif;font-weight:700;font-size:12px}
  .sc .k{font-size:9px;color:var(--fog);margin-top:1px}
  .sc.sel{border-color:var(--amber);background:#1d1a12}.sc.sel .c{color:var(--amber)}
  .sc.off{opacity:.25;cursor:not-allowed}.sc.off:hover{border-color:var(--line)}
  .sc .j{display:block;font-size:8px;color:var(--amber);margin-top:2px;font-family:"Oswald",sans-serif}
  /* une case par ligne, sur toute la largeur : les noms respirent */
  #tgs{flex-direction:column;gap:7px}
  .tg{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);
    background:var(--card2);cursor:pointer;font-size:12.5px;width:100%}
  .tg .p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
  .tg .why{margin-left:auto;flex-shrink:0}
  .tg:hover{border-color:var(--amber-soft)}
  .tg.sel{border-color:var(--amber);background:#1d1a12}.tg.sel .p{color:var(--amber)}
  .tg.off{opacity:.3;cursor:not-allowed}.tg.off:hover{border-color:var(--line)}
  .tg .p{font-weight:700}
  .why{font-family:"Oswald",sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--err);border:1px solid var(--red);padding:1px 5px}

  /* spéciales */
  /* carrousel de spéciales : une seule ligne de nav + le classement dessous */
  .carou{border:1px solid var(--line);background:var(--card2)}
  .cnav{display:flex;align-items:center;gap:12px;padding:11px 12px;border-bottom:1px solid var(--line)}
  .arr{width:40px;height:40px;flex-shrink:0;border:1px solid var(--line);background:var(--card);
    color:var(--paper);cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;
    justify-content:center;transition:.14s;font-family:"Oswald",sans-serif;padding:0}
  .arr:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
  .arr:disabled{opacity:.25;cursor:default}
  .cinfo{flex:1;min-width:0;text-align:center;cursor:pointer;position:relative}
  .cinfo .c{font-family:"Oswald",sans-serif;font-weight:700;font-size:15px;letter-spacing:.03em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cinfo .c b{color:var(--amber)}
  .cinfo .c .sep{color:var(--fog);font-weight:400}
  .cinfo .c .jk{color:var(--amber);font-size:11px;margin-left:6px}
  .cinfo .hintline{font-size:10px;color:#5b616b;margin-top:1px}
  /* menu déroulant pour sauter à une spéciale */
  .cmenu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);z-index:80;
    background:#0a0c0f;border:1px solid var(--line);padding:8px;display:none;
    grid-template-columns:repeat(5,1fr);gap:5px;width:270px;max-width:86vw;
    box-shadow:0 16px 40px -14px #000}
  .cmenu.open{display:grid}
  .cmenu .mi{padding:7px 4px;border:1px solid var(--line);background:var(--card);color:var(--fog);
    font-family:"Oswald",sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;
    position:relative}
  .cmenu .mi:hover{border-color:var(--amber-soft);color:var(--paper)}
  .cmenu .mi.on{border-color:var(--amber);background:#1d1a12;color:var(--amber)}
  .cmenu .mi.mav{border-color:#3a4048;color:#6f7681}      /* à venir  */
  .cmenu .mi.men{border-color:#7dd3fc;color:#7dd3fc;background:#12202b}  /* en cours */
  .cmenu .mi.mtm{border-color:var(--green);color:var(--green)}          /* terminée */
  .cmenu .mi.on{outline:2px solid var(--amber);outline-offset:-2px}
  .cbody{padding:6px 14px 14px}
  .sh2{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 10px;
    border-bottom:1px solid var(--line);margin-bottom:6px}
  .sh2 .montemps{font-family:"Space Mono",monospace;font-weight:700;font-size:18px;color:var(--paper)}
  .sh2 .dl{font-family:"Oswald",sans-serif;font-weight:700;font-size:16px}
  .sh2 .dl.g{color:var(--green)}.sh2 .dl.r{color:var(--err)}.sh2 .dl.n{color:var(--fog)}
  .swipehint{text-align:center;font-size:10px;color:#5b616b;padding:2px 0 10px;display:none}
  @media(hover:none){.swipehint{display:block}}

  .ss{border:1px solid var(--line);background:var(--card2);margin-bottom:8px}
  .sh{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
  .sh:hover{background:#1e232a}
  .sh .n{font-family:"Oswald",sans-serif;font-weight:700;font-size:13px;color:var(--fog);width:38px;flex-shrink:0}
  .sh .m{flex:1;font-size:13px;line-height:1.3}
  .sh .m small{display:block;color:var(--fog);font-size:11px;margin-top:2px}
  .sh .d{display:flex;flex-direction:column;align-items:flex-end;gap:1px;text-align:right;flex-shrink:0}
  .sh .d .tp{font-family:"Space Mono",monospace;font-size:12px;color:var(--paper);font-weight:700}
  .sh .d .dl{font-family:"Oswald",sans-serif;font-weight:700;font-size:14px}
  .sh .d .dl.g{color:var(--green)}.sh .d .dl.r{color:var(--err)}.sh .d .dl.n{color:var(--fog)}
  .sb{display:none;padding:0 14px 12px;border-top:1px solid var(--line)}
  .ss.open .sb{display:block}
  .lg{display:flex;justify-content:space-between;align-items:center;padding:9px 0;
    border-bottom:1px solid #23272e;font-size:12px;gap:10px}
  .lg:last-child{border-bottom:none}
  .lg .w{display:flex;align-items:center;gap:9px;min-width:0;flex:1;flex-wrap:nowrap}
  .lg .w .p{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
  /* la position dans la classe ne doit plus chevaucher le nom */
  .lg .pos{color:var(--fog);font-size:11px;white-space:nowrap;flex-shrink:0}
  /* colonne droite : la position est AU-DESSUS du bonus/malus */
  .lg .rt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:74px}
  .lg .rt .pos{margin:0;padding:0;text-align:right}
  .lg .jkb{margin-bottom:2px}

  /* infobulle générique (survol) */
  .hint{position:relative;cursor:help;border-bottom:1px dotted var(--fog)}
  .hint .hb{position:absolute;bottom:calc(100% + 9px);left:0;width:250px;max-width:78vw;
    background:#0a0c0f;border:1px solid var(--line);padding:11px 12px;text-align:left;
    opacity:0;visibility:hidden;transition:.15s;z-index:75;pointer-events:none;
    box-shadow:0 14px 34px -12px #000;font-size:11.5px;line-height:1.5;color:var(--fog);
    white-space:normal}
  .hint:hover .hb,.hint.show .hb{opacity:1;visibility:visible}
  .hb .ht{font-family:"Oswald",sans-serif;font-weight:700;font-size:11.5px;color:var(--amber);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;
    padding-bottom:6px;border-bottom:1px solid var(--line)}
  .hb .hr{display:flex;justify-content:space-between;gap:10px;padding:4px 0;line-height:1.35}
  .hb .hr+.hr{border-top:1px solid #1e232a}
  .hb .hr b{color:var(--paper);font-weight:700}
  .hb .hs{margin-top:8px;padding-top:7px;border-top:1px solid var(--line);color:var(--paper)}
  .hb .g2{color:var(--green)}.hb .r2{color:var(--err)}
  .nm-h{cursor:help;position:relative}
  .nm-h:hover{color:var(--amber)}
  /* la fenêtre part vers la DROITE du nom (sur mobile, ne sort pas de l'écran) */
  .nm-h .hb{left:0;right:auto}
  .auto{font-size:10.5px;color:#5b616b;text-align:right;margin-top:8px;display:flex;
    align-items:center;justify-content:flex-end;gap:6px}
  .auto b{color:var(--fog)}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;
    animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  .bm{font-family:"Oswald",sans-serif;font-weight:700;white-space:nowrap;font-size:15px}
  .bm.sm{font-size:12.5px}                       /* pilotes & voiture : plus petit */
  .bm.g{color:var(--green)}.bm.r{color:var(--err)}.bm.n{color:var(--fog)}
  .clab{color:var(--fog);font-weight:400}
  .voit .p{color:var(--fog)}
  .old{color:var(--fog);text-decoration:line-through;font-size:11px;margin-right:6px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-family:"Oswald",sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:.12em;font-size:10px;
    color:var(--fog);text-align:left;padding:0 6px 9px;border-bottom:1px solid var(--line)}
  td{padding:10px 6px;border-bottom:1px solid #23272e}
  tr:last-child td{border-bottom:none}
  .p{font-family:"Oswald",sans-serif;font-weight:700;color:var(--fog);width:26px}
  .me{background:#1d1a12}.me .p{color:var(--amber)}
  .t{text-align:right;font-family:"Oswald",sans-serif;font-weight:700}
  .e{text-align:right;font-size:11px;color:var(--fog)}
  .lead .t{color:var(--amber)}

  .tabs{display:flex;gap:0;margin:14px 0 0;border-bottom:1px solid var(--line)}
  .tb{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    padding:9px 14px;cursor:pointer;color:var(--fog);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tb:hover{color:var(--paper)}
  .tb.on{color:var(--amber);border-bottom-color:var(--amber)}
  .tv{display:none;padding-top:10px}.tv.on{display:block}
  .ev{font-family:"Oswald",sans-serif;font-weight:700;font-size:11px;text-align:right;white-space:nowrap}
  .ev.up{color:var(--green)}.ev.dn{color:var(--err)}.ev.eq{color:#4a5058}
  .win{font-family:"Oswald",sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--amber);color:var(--amber);padding:1px 5px;margin-left:6px}
  .cal{display:flex;flex-direction:column}
  .cr{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #23272e;font-size:13px}
  .cr:last-child{border-bottom:none}
  .cr.now{background:#1d1a12;padding-left:10px;border-left:3px solid var(--amber)}
  .cr .dt{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.06em;color:var(--fog);width:130px;flex-shrink:0}
  .cr .nm{flex:1;line-height:1.35}
  .cr .nm small{display:block;color:var(--fog);font-size:11px;margin-top:2px}
  .tg2{font-family:"Oswald",sans-serif;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--line);color:var(--fog);flex-shrink:0;white-space:nowrap}
  .tg2.att{border-color:#4a5058;color:#6f7681}
  .tg2.ouv{border-color:var(--green);color:var(--green)}
  .tg2.enc{border-color:var(--amber);color:var(--amber);background:#1d1a12}
  .tg2.fin{border-color:var(--line);color:#5b616b}
  /* programme des spéciales */
  .prg{display:flex;flex-direction:column}
  .pr{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid #23272e;font-size:12.5px}
  .pr:last-child{border-bottom:none}
  .pr.next{background:#12202b;padding-left:9px;border-left:3px solid #7dd3fc}
  .pr .c{font-family:"Oswald",sans-serif;font-weight:700;font-size:12px;color:var(--fog);width:36px;flex-shrink:0}
  .pr .n{flex:1;line-height:1.35;min-width:0}
  .pr .n small{display:block;color:var(--fog);font-size:11px;margin-top:1px}
  .pr .h{font-family:"Oswald",sans-serif;font-size:12px;color:var(--paper);
    font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
  .pr .h small{display:block;color:var(--fog);font-size:10px;font-family:"Space Mono",monospace}
  .et{font-family:"Oswald",sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 7px;border:1px solid var(--line);flex-shrink:0;white-space:nowrap}
  .et.av{border-color:#4a5058;color:#6f7681}
  .et.en{border-color:#7dd3fc;color:#7dd3fc;background:#12202b}
  .et.tm{border-color:var(--green);color:var(--green)}
  .jkp{font-size:9px;color:var(--amber);font-family:"Oswald",sans-serif;letter-spacing:.06em}

  .cd{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--fog);white-space:nowrap}
  .cd .t{font-family:"Oswald",sans-serif;font-weight:700;font-size:16px;color:var(--amber);
    font-variant-numeric:tabular-nums;letter-spacing:.04em}
  .cd.urgent .t{color:var(--err)}
  .cd.urgent{animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
  .late{text-align:center;padding:40px 24px}
  .late .ic{font-size:34px;margin-bottom:14px}
  .late h3{font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    font-size:19px;color:var(--amber);margin-bottom:10px}
  .late p{color:var(--fog);font-size:13.5px;line-height:1.65;max-width:46ch;margin:0 auto 6px}
  .late .nx{margin-top:18px;font-size:12px;color:var(--paper)}
  .late .nx b{color:var(--amber)}
  .rd{border:1px solid var(--line);background:var(--card2);margin-bottom:8px}
  .rdh{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
  .rdh:hover{background:#1e232a}
  .rdn{flex:1;font-weight:700;font-size:13px;line-height:1.35;min-width:0}
  .rdn small{display:block;color:var(--fog);font-weight:400;font-size:11px;margin-top:2px}
  .rdx{color:var(--fog);font-size:12px;transition:transform .2s;flex-shrink:0}
  .rd.open .rdx{transform:rotate(180deg)}
  .rdb{display:none;padding:0 14px 12px;border-top:1px solid var(--line)}
  .rd.open .rdb{display:block}
  .wait{text-align:center;padding:34px 20px}
  .wait .ic{font-size:30px;color:var(--fog);margin-bottom:12px}
  .wait h3{font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    font-size:17px;color:var(--amber);margin-bottom:8px}
  .wait p{color:var(--fog);font-size:13px;line-height:1.6;max-width:44ch;margin:0 auto}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:880px){.cols{grid-template-columns:1fr}}
  .hide{display:none}
  .load{text-align:center;color:var(--fog);padding:50px 20px;font-size:13px}
</style>
</head>
<body>

<header><div class="in">
  <div class="mark">AZ<span>RALLYE</span>GAME</div>
  <div class="tag">Chrono Rallye Race</div>
  <div class="usr"><span id="who"></span><a href="/menu.html">← Menu</a></div>
</div></header>

<div class="wrap">
  <div id="load" class="load">Chargement du rallye…</div>
  <div id="app" class="hide"></div>
</div>

<script>
'use strict';
var U=null,T=null;
try{U=localStorage.getItem('azr_user');T=localStorage.getItem('azr_token');}catch(e){}
if(!U||!T){location.replace('/');}
document.getElementById('who').innerHTML='Écurie <b>'+U+'</b>';

var R=null, MOI=null, CL=null, CAL=[], CHP={classement:[],rallyes:[]};
var S={crews:[null,null,null],car:null};           // composition en cours
var J={joker:null,ss:null,tg:null};                // joker en cours
var canHover=matchMedia('(hover:hover)').matches;

var ICON={
 flat:'<svg viewBox="0 0 24 24"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>',
 cold:'<svg viewBox="0 0 24 24"><path d="M12 2v20M4.5 6.5l15 11M19.5 6.5l-15 11"/><circle cx="12" cy="12" r="3"/></svg>',
 forf:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><circle cx="8.5" cy="8.5" r="1.3" fill="#8b929c" stroke="none"/><circle cx="15.5" cy="15.5" r="1.3" fill="#8b929c" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="#8b929c" stroke="none"/></svg>',
 pwr:'<svg viewBox="0 0 24 24"><path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.4 6.8 19.1l1-5.8L3.5 9.2l5.9-.9z"/></svg>',
 regl:'<svg viewBox="0 0 24 24"><path d="M5 20V10M12 20V4M19 20v-6"/><circle cx="5" cy="7" r="2"/><circle cx="12" cy="15" r="2"/><circle cx="19" cy="10" r="2"/></svg>'
};
var JK=[
 {id:'flat',t:'Flat Out',d:"Double le bonus ou le malus de l'équipage visé sur cette spéciale."},
 {id:'cold',t:'Tête froide',d:"Annule le bonus/malus de l'équipage visé sur cette spéciale."},
 {id:'forf',t:'Temps forfaitaire',d:"Applique un classement aléatoire dans sa classe à l'équipage visé."},
 {id:'pwr',t:'Power stage',d:"Bonus supplémentaire selon le rang dans la classe : -5s au 1er, -4s au 2e, -3s au 3e, -2s au 4e, -1s au 5e."},
 {id:'regl',t:'Bons réglages',d:"Fait gagner une place à l'équipage visé dans le classement de sa classe."}
];

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function fmt(s){var m=Math.floor(s/60),r=(s%60).toFixed(1);if(r<10)r='0'+r;return m+':'+r;}
// Chrono long : h:mm:ss.d (pour un cumul de rallye qui peut dépasser l'heure).
function fmtLong(s){
  var h=Math.floor(s/3600), m=Math.floor(s%3600/60), sec=(s%60).toFixed(1);
  if(sec<10)sec='0'+sec;
  if(m<10&&h>0)m='0'+m;
  return (h>0?h+':':'')+m+':'+sec;
}
// Bonus/malus : valeur de jeu, toujours en secondes brutes (ex : -6.7, +15.0).
function sg(v){return (v>0?'+':'')+Number(v).toFixed(1);}
// Écart de temps : secondes sous 1 min, m:ss.d au-delà (ex : +8:00.0 et non +480.0s).
function ec(v){
  var n=Number(v)||0, neg=n<0, a=Math.abs(n);
  var t=(a<60)?a.toFixed(1)+'s':fmt(a);
  return (neg?'−':'+')+t;
}
function enjeu(n){if(n<=3)return{b:1,t:'Bonus/Malus faibles',hi:false};
  if(n<=6)return{b:2,t:'Bonus/Malus moyens',hi:false};return{b:3,t:'Bonus/Malus forts',hi:true};}
function gauge(n){var e=enjeu(n),b='';for(var i=1;i<=3;i++)b+='<i class="'+(i<=e.b?'on':'')+'"></i>';
  return '<span class="g '+(e.hi?'':'low')+'">'+b+'</span><span class="lvl '+(e.hi?'hi':'')+'">'+e.t+'</span>';}
function H(u,o){o=o||{};o.headers=o.headers||{};o.headers['Authorization']='Bearer '+T;
  if(o.body){o.headers['Content-Type']='application/json';o.body=JSON.stringify(o.body);}
  return fetch(u,o).then(function(r){return r.json().then(function(d){d._s=r.status;return d;});});}

// ── chargement ───────────────────────────────────────────────────────────────
function charger(){
  return H('/api/crr/rallye').then(function(d){
    if(!d.ok) throw new Error(d.error||'Rallye indisponible');
    R=d.rallye; CAL=d.calendrier||[];
    return Promise.all([H('/api/crr/moi?rallye='+R.id), H('/api/crr/classement?rallye='+R.id), H('/api/crr/championnat')]);
  }).then(function(res){
    MOI=res[0].ok?res[0]:{ecurie:null,jokers:[],course:null};
    CL=res[1].ok?res[1]:{general:[],parSpeciale:{},joueurs:0};
    CHP=res[2]&&res[2].ok?res[2]:{classement:[],rallyes:[],provisoire:false};
    document.getElementById('load').classList.add('hide');
    document.getElementById('app').classList.remove('hide');
    rendre();
  }).catch(function(e){
    document.getElementById('load').innerHTML='<div class="msg err">'+esc(e.message)+'</div>';
  });
}

function eng(id){for(var i=0;i<R.engages.length;i++)if(R.engages[i].id===id)return R.engages[i];return null;}

// Bloc "mon écurie" affiché en HAUT (dans le hero) et en course.
function blocEcurieHero(){
  if(!MOI.ecurie)return '';
  var lignes=MOI.ecurie.equipages.map(function(id){
    var e=eng(id);if(!e)return '';
    return '<div class="eq"><span class="eqn">#'+esc(e.id)+'</span>'
      +'<span class="eqp">'+esc(e.pilote)+'</span>'
      +'<span class="eqi">'+esc(e.classe)+' · '+(R.classes[e.classe]||'?')+' engagés</span></div>';
  }).join('');
  var v=MOI.ecurie.voiture, nv=nbEquipagesVoiture(v);
  lignes+='<div class="eq"><span class="eqn"></span>'
    +'<span class="eqp">'+esc(v)+'</span>'
    +'<span class="eqi">'+nv+' équipage'+(nv>1?'s':'')+'</span></div>';
  return '<div class="ecu"><div class="ecuh">Mon écurie · '+MOI.ecurie.cout+' crédits · '
    +MOI.jokers.length+'/'+R.maxJokers+' jokers</div>'+lignes+'</div>';
}
function nbEquipagesVoiture(m){
  var n=0;for(var i=0;i<R.engages.length;i++)if(R.engages[i].modele===m)n++;return n;
}
// Heure locale d'une spéciale (le serveur donne de l'UTC).
function heure(iso){
  if(!iso)return '';
  var d=new Date(iso);
  if(isNaN(d))return '';
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function jour(iso){
  if(!iso)return '';
  var d=new Date(iso);
  if(isNaN(d))return '';
  return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}

// Programme du rallye : spéciales, horaires, état (à venir / en cours / terminée).
function blocProgramme(){
  if(!R.speciales||!R.speciales.length)return '';
  var prochaine=null;
  for(var i=0;i<R.speciales.length;i++){
    if(!R.speciales[i].courue&&!R.speciales[i].partie){prochaine=R.speciales[i].code;break;}
  }
  return '<h2 class="sec">Programme du rallye</h2><div class="panel"><div class="prg">'
   + R.speciales.map(function(s){
      // À venir : horaire pas encore atteint. En cours : horaire dépassé mais
      // classement pas encore saisi. Terminée : classement intégré.
      var et,cl;
      if(s.courue){et='Terminée';cl='tm';}
      else if(s.partie){et='En cours';cl='en';}
      else {et='À venir';cl='av';}
      var jk=MOI.jokers?MOI.jokers.filter(function(j){return j.ss===s.code;}).length:0;
      return '<div class="pr'+(s.code===prochaine?' next':'')+'">'
       +'<span class="c">'+esc(s.code)+'</span>'
       +'<div class="n">'+esc(s.nom)+'<small>'+s.km+' km'
         +(jk?' · <span class="jkp">'+jk+' joker'+(jk>1?'s':'')+'</span>':'')+'</small></div>'
       +'<span class="h">'+heure(s.depart)+'<small>'+jour(s.depart)+'</small></span>'
       +'<span class="et '+cl+'">'+et+'</span></div>';
     }).join('')
   + '</div></div>';
}
function courues(){return R.speciales.filter(function(s){return s.courue;});}

// ── vue principale ───────────────────────────────────────────────────────────
var _vue='rallye';   // 'rallye' | 'saison'
function rendre(){
  var a=document.getElementById('app');
  // barre d'onglets commune
  var onglets='<div class="onglets">'
    +'<div class="og'+(_vue==='rallye'?' on':'')+'" data-v="rallye">Rallye</div>'
    +'<div class="og'+(_vue==='saison'?' on':'')+'" data-v="saison">Saison</div>'
    +'</div>';
  a.innerHTML=onglets+'<div id="vue"></div>';
  Array.prototype.forEach.call(a.querySelectorAll('.og'),function(el){
    el.onclick=function(){ _vue=el.getAttribute('data-v'); rendre(); };
  });
  if(_vue==='saison') rendreSaison(document.getElementById('vue'));
  else rendreRallye(document.getElementById('vue'));
}

function rendreRallye(a){
  var nbC=courues().length;
  var moi=CL.general.filter(function(l){return l.user===U;})[0];
  var lead=CL.general.length?CL.general[0].total:0;

  var kick={attente:'Prochain rallye',ouvert:'Rallye du week-end',
            encours:'Rallye en cours',termine:'Rallye terminé'}[R.etat]||'Rallye';

  var stats='';
  if(R.etat!=='attente'){
    stats='<div class="stats">'
     + '<div class="st"><div class="k">Mon chrono</div><div class="v amber">'
        +(MOI.course&&MOI.course.courues?fmtLong(MOI.course.total):'—')
        +'</div><div class="s">'+nbC+' / '+R.speciales.length+' spéciales</div></div>'
     + '<div class="st"><div class="k">Provisoire</div><div class="v">'+(moi?moi.rang+'ᵉ':'—')
        +'</div><div class="s">'+(moi&&moi.rang>1?ec(moi.total-lead)+' du leader':(moi?'leader':'pas classé'))+'</div></div>'
     + '<div class="st"><div class="k">Jokers posés</div><div class="v">'+MOI.jokers.length
        +'</div><div class="s">sur '+R.maxJokers+' max</div></div>'
     + '</div>';
    if(MOI.ecurie) stats += blocEcurieHero();
  }

  a.innerHTML=
   '<div class="hero">'
   + '<div class="kick">'+kick+'</div>'
   + '<h1>'+esc(R.nom)+'</h1>'
   + '<div class="meta"><span><b>'+esc(R.dates)+'</b></span><span>'+esc(R.surface)+'</span>'
     +(R.etat==='attente'?''
       :'<span><b>'+R.engages.length+'</b> engagés · '+Object.keys(R.classes).length+' classes</span>')
     +'<span>'+esc(R.championnat||'')+'</span>'
     +'<span><b>'+(CL&&CL.joueurs?CL.joueurs:0)+'</b> joueur'+((CL&&CL.joueurs>1)?'s':'')+' engagé'+((CL&&CL.joueurs>1)?'s':'')+'</span></div>'
   + stats
   + (R.etat!=='attente'?'<div class="auto" id="maj"></div>':'')
   + '</div>'
   + '<div id="body"></div>';

  var b=document.getElementById('body');
  if(R.etat==='attente')            vueAttente(b);
  else if(!MOI.ecurie && R.ouvert)  vueCompo(b);
  else if(!MOI.ecurie && !R.ouvert) vueTropTard(b);
  else                              vueCourse(b);
}

// ── PAGE DE LA SAISON : championnat + calendrier (rallye en cours cliquable) ──
function rendreSaison(a){
  document.body.classList.remove('hasbar');
  a.innerHTML='<div class="hero" style="border-left-color:var(--amber)">'
   +'<div class="kick">Saison</div><h1>Championnat</h1>'
   +'<div class="meta"><span>'+(CHP.rallyes?CHP.rallyes.length:0)+' rallye(s) couru(s)</span>'
   +'<span>'+(CAL.length)+' au calendrier</span>'
   +(R.etat!=='attente'?'':'')+'</div>'
   +'<div class="auto" id="maj"></div></div>'
   + blocChampionnatTable()
   + blocCalendrierListe();
  majEtat(false);
  brancherCalendrier(a);
}

// clic sur le rallye en cours dans le calendrier -> bascule vers l'onglet Rallye
function brancherCalendrier(root){
  Array.prototype.forEach.call(root.querySelectorAll('.cr'),function(el){
    var id=el.getAttribute('data-id');
    if(!id)return;
    var c=CAL.filter(function(x){return x.id===id;})[0];
    if(c && (c.etat==='ouvert'||c.etat==='encours')){
      el.classList.add('clic');
      el.onclick=function(){ _vue='rallye'; rendre(); };
    }
  });
}

// ── rallye sans données ──────────────────────────────────────────────────────
function vueAttente(b){
  document.body.classList.remove('hasbar');
  b.innerHTML='<h2 class="sec">Engagés</h2>'
   +'<div class="panel"><div class="wait"><div class="ic">⏳</div>'
   +'<h3>Informations en attente</h3>'
   +'<p>La liste des engagés et le programme horaire de ce rallye ne sont pas encore publiés. '
   +'Reviens un peu plus tard pour composer ton écurie.</p></div></div>'
   + blocCalendrier();
}

// ── calendrier de la saison ──────────────────────────────────────────────────
// (le calendrier n'est plus affiché dans les vues de rallye : il est dans l'onglet Saison)
function blocCalendrier(){ return ''; }

// Tableau du championnat : Joueur | Total | R1 | R2 | R3 …
// Colonnes Joueur+Total figées à gauche, rallyes défilables horizontalement.
function blocChampionnatTable(){
  var rs=CHP.rallyes||[];
  var cl=CHP.classement||[];
  if(!cl.length)return '<h2 class="sec">Championnat</h2><div class="panel"><div class="msg">Aucun point marqué pour l\'instant. Le classement apparaîtra dès la première spéciale disputée.</div></div>';

  // points par (joueur, rallye)
  var ptsPar={};
  rs.forEach(function(r){

      +'<td class="c1">'+esc(l.user)+'</td>'
      +'<td class="c2">'+l.points+'</td>'+cells+'</tr>';

  return '<h2 class="sec">Classement du championnat'+(CHP.provisoire?' — provisoire':'')+'</h2>'
   +'<div class="panel" style="padding:0"><div class="chwrap"><table class="chtab">'
   +'<thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>'
   +'<div style="padding:12px 14px;font-size:11px;color:var(--fog)">'
   +(CHP.provisoire?'Provisoire — évolue à chaque spéciale. ':'Définitif. ')
   +'Fais glisser le tableau pour voir tous les rallyes. Les colonnes marquées • sont en cours.</div></div>';
}

function cout(){var s=0;S.crews.forEach(function(c){if(c)s+=c.cout;});if(S.car)s+=S.car.cout;return s;}
function prises(){return S.crews.filter(Boolean).map(function(c){return c.classe;});}
function togC(e){
  var i=-1;S.crews.forEach(function(c,k){if(c&&c.id===e.id)i=k;});
  if(i>=0){S.crews[i]=null;return majCompo();}
  if(prises().indexOf(e.classe)>=0)return;
  var f=S.crews.indexOf(null);if(f<0)return;
  if(cout()+e.cout>R.budget)return;
  S.crews[f]=e;majCompo();
}
function togV(v){
  if(S.car&&S.car.modele===v.modele){S.car=null;return majCompo();}
  if(cout()-(S.car?S.car.cout:0)+v.cout>R.budget)return;
  S.car=v;majCompo();
}
function majCompo(){
  var s=cout();
  document.getElementById('sp').textContent=s;
  document.getElementById('bar').firstChild.style.width=Math.min(100,s/R.budget*100)+'%';

  [0,1,2].forEach(function(i){
    var sl=document.querySelector('[data-c="'+i+'"]'),c=S.crews[i];
    if(c){sl.className='slot on';
      sl.innerHTML='<button class="x">×</button><div><span class="chip cl">'+esc(c.classe)+'</span></div>'
        +'<div class="n">'+esc(c.pilote)+'</div><div class="s">#'+esc(c.id)+'</div>'
        +'<div class="b"><span class="s">'+R.classes[c.classe]+' engagés</span><span class="c">'+c.cout+'</span></div>';
      sl.querySelector('.x').onclick=function(ev){ev.stopPropagation();S.crews[i]=null;majCompo();};
    }else{sl.className='slot';
      sl.innerHTML='<span class="r">Équipage '+(i+1)+'</span><span class="h">'+(i===0?'Choisis ci-dessous':'Autre classe')+'</span>';}
  });
  var cs=document.querySelector('[data-car="1"]');
  if(S.car){cs.className='slot on car';
    cs.innerHTML='<button class="x">×</button><div><span class="chip cl">Voiture</span></div>'
      +'<div class="n" title="'+esc(S.car.modele)+'">'+esc(S.car.modele)+'</div>'
      +'<div class="s">'+(S.car.classes||[]).join(' / ')+'</div>'
      +'<div class="b"><span class="s">'+S.car.n+' équipage'+(S.car.n>1?'s':'')+'</span>'
      +'<span class="c">'+S.car.cout+'</span></div>';
    cs.querySelector('.x').onclick=function(ev){ev.stopPropagation();S.car=null;majCompo();};
  }else{cs.className='slot car';cs.innerHTML='<span class="r">Voiture</span><span class="h">1 modèle</span>';}

  var u=prises(),full=S.crews.filter(Boolean).length>=3;
  R.engages.forEach(function(e){
    var el=document.querySelector('[data-crew="'+e.id+'"]');if(!el)return;
    var sel=S.crews.some(function(c){return c&&c.id===e.id;});
    var lock=!sel&&(u.indexOf(e.classe)>=0||full||s+e.cout>R.budget);
    el.classList.toggle('sel',sel);el.classList.toggle('lock',lock);
  });
  Object.keys(R.classes).forEach(function(c){
    var t=document.querySelector('[data-lk="'+c+'"]');if(t)t.style.display=u.indexOf(c)>=0?'inline':'none';
  });
  R.voitures.forEach(function(v){
    var el=document.querySelector('[data-car="'+v.modele+'"]');if(!el)return;
    var sel=S.car&&S.car.modele===v.modele;
    var lock=!sel&&(s-(S.car?S.car.cout:0)+v.cout>R.budget);
    el.classList.toggle('sel',!!sel);el.classList.toggle('lock',lock);
  });

  var n=S.crews.filter(Boolean).length,ready=n===3&&S.car;
  document.getElementById('ok').disabled=!ready;
  var st=document.getElementById('st');
  if(ready)st.innerHTML='Écurie complète — <b>'+s+' crédits</b> utilisés, <b>'+(R.budget-s)+'</b> restants.';
  else{var nd=[];if(n<3)nd.push((3-n)+' équipage(s)');if(!S.car)nd.push('1 voiture');
    st.innerHTML='Il te manque : <b>'+nd.join(' + ')+'</b> · '+(R.budget-s)+' crédits restants.';}
}
// Compte à rebours avant la clôture des écuries (départ de l'ES1).
var _tick=null;
function lancerCompte(){
  if(_tick){clearInterval(_tick);_tick=null;}
  var el=document.getElementById('cd');
  if(!el||!R.cloture)return;
  var fin=Date.parse(R.cloture);
  if(isNaN(fin))return;
  function maj(){
    var d=fin-Date.now();
    if(d<=0){
      clearInterval(_tick);_tick=null;
      el.innerHTML='<span class="t">Clôturé</span>';
      charger();                       // la course a commencé : on recharge
      return;
    }
    var j=Math.floor(d/86400000), h=Math.floor(d%86400000/3600000),
        m=Math.floor(d%3600000/60000), sec=Math.floor(d%60000/1000);
    var txt = j>0 ? (j+'j '+p2(h)+':'+p2(m)+':'+p2(sec)) : (p2(h)+':'+p2(m)+':'+p2(sec));
    el.className='cd'+(d<600000?' urgent':'');      // rouge sous 10 min
    el.innerHTML='Clôture des écuries dans <span class="t">'+txt+'</span>';
  }
  function p2(n){return (n<10?'0':'')+n;}
  maj(); _tick=setInterval(maj,1000);
}

function valider(){
  var btn=document.getElementById('ok');btn.disabled=true;
  H('/api/crr/ecurie',{method:'POST',body:{rallye:R.id,
    equipages:S.crews.map(function(c){return c.id;}),voiture:S.car.modele}})
  .then(function(d){
    if(!d.ok){document.getElementById('err').innerHTML='<div class="msg err">'+esc(d.error)+'</div>';btn.disabled=false;return;}
    return charger();
  }).catch(function(){document.getElementById('err').innerHTML='<div class="msg err">Serveur injoignable.</div>';btn.disabled=false;});

function vueCourse(b){
  document.body.classList.remove('hasbar');

var _ssIdx=null;
// État d'une spéciale d'après R.speciales : mav (à venir) / men (en cours) / mtm (terminée)
function etatSSclass(code){
  for(var i=0;i<R.speciales.length;i++){
    if(R.speciales[i].code!==code)continue;
    var sp=R.speciales[i];
    if(sp.courue)return 'mtm';
    if(sp.partie)return 'men';
    return 'mav';
  }
  return 'mav';
}
function renderCarou(L,ss){
  var i=_ssIdx, s=ss[i];
  var cls=s.delta<0?'g':(s.delta>0?'r':'');
  var jkOnSS=MOI.jokers.filter(function(j){return j.ss===s.code;});

  L.innerHTML='<div class="carou">'
   + '<div class="cnav">'
     + '<button class="arr" id="prev" '+(i<=0?'disabled':'')+'>‹</button>'
     + '<div class="cinfo" id="cinfo">'
       + '<div class="c"><b>'+esc(s.code)+'</b><span class="sep">/'+ss.length+'</span>'
         + ' <span class="sep">—</span> '+esc(s.nom)+'</div>'
       + '<div class="hintline">▾ cliquer pour choisir une spéciale</div>'
       + '<div class="cmenu" id="cmenu">'
         + ss.map(function(x,k){
             var cl=etatSSclass(x.code);
             return '<div class="mi '+cl+(k===i?' on':'')+'" data-k="'+k+'">'+esc(x.code)+'</div>';
           }).join('')
       + '</div>'
     + '</div>'
     + '<button class="arr" id="next" '+(i>=ss.length-1?'disabled':'')+'>›</button>'
   + '</div>'
   + '<div class="cbody">'
     + '<div class="sh2"><span class="montemps">'+fmt(s.temps)+'</span>'
       + '<span class="dl '+(cls||'n')+'">'+sg(s.delta)+'</span></div>'
     + '<div class="sb" style="display:block;border:none;padding:0">'
       + s.detail.map(function(x){return ligneEquipage(x);}).join('')
       + ligneVoiture(s.voiture)
       + '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)">'+tablesSS(s.code)+'</div>'
     + '</div>'
   + '</div>'
   + '<div class="swipehint">← glisse pour changer de spéciale →</div>'
   + '</div>';

  var prev=document.getElementById('prev'), next=document.getElementById('next');
  if(prev)prev.onclick=function(){if(_ssIdx>0){_ssIdx--;renderCarou(L,ss);}};
  if(next)next.onclick=function(){if(_ssIdx<ss.length-1){_ssIdx++;renderCarou(L,ss);}};

  // menu déroulant pour sauter directement à une spéciale
  var cinfo=document.getElementById('cinfo'), cmenu=document.getElementById('cmenu');
  if(cinfo&&cmenu){
    cinfo.onclick=function(e){
      if(e.target.classList.contains('mi'))return;
      e.stopPropagation();
      cmenu.classList.toggle('open');
    };
    Array.prototype.forEach.call(cmenu.querySelectorAll('.mi'),function(d){
      d.onclick=function(ev){ev.stopPropagation();_ssIdx=+d.getAttribute('data-k');renderCarou(L,ss);};
    });
  }
  brancherTabs(L);

  // navigation tactile (swipe gauche/droite)
  var x0=null, car=L.querySelector('.carou');
  car.addEventListener('touchstart',function(e){x0=e.touches[0].clientX;},{passive:true});
  car.addEventListener('touchend',function(e){
    if(x0==null)return;
    var dx=e.changedTouches[0].clientX-x0; x0=null;
    if(Math.abs(dx)<45)return;
    if(dx<0 && _ssIdx<ss.length-1){_ssIdx++;renderCarou(L,ss);}
    else if(dx>0 && _ssIdx>0){_ssIdx--;renderCarou(L,ss);}
  },{passive:true});
}
document.addEventListener('keydown',function(e){
  var L=document.getElementById('sslist'); if(!L||!L.querySelector('.carou'))return;
  if(/input|textarea/i.test((e.target.tagName||'')))return;
  var ss=(MOI.course&&MOI.course.speciales)||[];
  if(e.key==='ArrowLeft'&&_ssIdx>0){_ssIdx--;renderCarou(L,ss);}
  if(e.key==='ArrowRight'&&_ssIdx<ss.length-1){_ssIdx++;renderCarou(L,ss);}
});
function nomJk(id){for(var i=0;i<JK.length;i++)if(JK[i].id===id)return JK[i].t;return id;}
function descJk(id){for(var i=0;i<JK.length;i++)if(JK[i].id===id)return JK[i].d;return '';}

// Ligne d'un équipage dans le détail d'une spéciale.
function ligneEquipage(x){
  var c=x.bm<0?'g':(x.bm>0?'r':'n');
  // classe À DROITE, avant la position : "A8 · 2ᵉ / 21" (point médian)
  var pos=(x.res==='Ab'||x.res==='Fo')
        ? '<span class="pos"><b class="clab">'+esc(x.classe)+'</b> · '+(x.res==='Ab'?'Abandon':'Forfait')+'</span>'
        : (x.res==='Tf' ? '<span class="pos"><b class="clab">'+esc(x.classe)+'</b> · Temps forf.</span>'
        : '<span class="pos"><b class="clab">'+esc(x.classe)+'</b> · '+x.res+'ᵉ / '+x.engages+'</span>');

  var val;
  if(x.joker){
    var gain=Math.round((x.bm-x.brut)*10)/10;
    var gc=gain<0?'g2':(gain>0?'r2':'');
    val='<span class="hint"><span class="bm sm '+c+'">'+sg(x.bm)+'</span>'
      +'<span class="hb"><span class="ht">Joker · '+esc(nomJk(x.joker))+'</span>'
      +esc(descJk(x.joker))
      +'<span class="hr" style="margin-top:7px"><span>Sans le joker</span><b>'+sg(x.brut)+' s</b></span>'
      +'<span class="hr"><span>Avec le joker</span><b>'+sg(x.bm)+' s</b></span>'
      +'<span class="hs">Gain : <b class="'+gc+'">'+(gain===0?'aucun':sg(gain)+' s')+'</b></span>'
      +'</span></span>';
  } else {
    val='<span class="bm sm '+c+'">'+sg(x.bm)+'</span>';
  }

  return '<div class="lg"><div class="w"><span class="p">'+esc(x.pilote)+'</span>'
    +(x.joker?'<span class="chip cl jkb">'+esc(nomJk(x.joker))+'</span>':'')+'</div>'
    +'<div class="rt">'+pos+val+'</div></div>';
}

// Ligne voiture : au survol, le bonus/malus de CHAQUE équipage du modèle.
function ligneVoiture(v){
  var c=v.bm<0?'g':(v.bm>0?'r':'n');
  var lignes=v.lignes||[];
  // Repli : si le serveur ne renvoie pas le détail (ancienne version),
  // on compte au moins les équipages du modèle dans la liste des engagés.
  var nb = lignes.length || nbEquipagesVoiture(v.modele);
  var det='';
  if(lignes.length){
    det='<span class="hb"><span class="ht">Moyenne de '+lignes.length+' équipage'+(lignes.length>1?'s':'')+'</span>'
      + lignes.map(function(l){
          var lc=l.bm<0?'g2':(l.bm>0?'r2':'');
          var r=(l.res==='Ab')?'Ab':(l.res==='Tf'?'Tf':l.res+'ᵉ/'+l.engages);
          return '<span class="hr"><span>'+esc(l.pilote)+' <i style="color:#5b616b;font-style:normal">'+r+'</i></span>'
            +'<b class="'+lc+'">'+sg(l.bm)+'</b></span>';
        }).join('')
      +'<span class="hs">Moyenne : <b class="'+(v.bm<0?'g2':(v.bm>0?'r2':''))+'">'+sg(v.bm)+' s</b>'
      +'<br><i style="color:#5b616b;font-style:normal;font-size:10.5px">Les forfaits sont exclus de la moyenne.</i></span>'
      +'</span>';
  }
  return '<div class="lg voit"><div class="w"><span class="p">'+esc(v.modele)+'</span></div>'
    +'<div class="rt"><span class="pos">'+nb+' équipage'+(nb>1?'s':'')+'</span>'
    +'<span class="hint'+(det?'':'" style="border:none;cursor:default')+'">'
    +'<span class="bm sm '+c+'">'+sg(v.bm)+'</span>'+det+'</span></div></div>';
}

// Infobulle sur un adversaire : sa compo, et sur une spéciale ses bonus/malus.
function infoJoueur(user, code){
  var co=(CL.compos||{})[user];
  if(!co)return esc(user);
  var h='<span class="ht">Écurie '+esc(user)+' · '+co.cout+' cr.</span>';

  if(code){
    var l=((CL.parSpeciale||{})[code]||[]).filter(function(x){return x.user===user;})[0];
    if(l&&l.detail){
      h+=l.detail.map(function(d){
        var dc=d.bm<0?'g2':(d.bm>0?'r2':'');
        var r=(d.res==='Ab')?'Ab':(d.res==='Fo'?'Fo':(d.res==='Tf'?'Tf':d.res+'ᵉ/'+d.engages));
        return '<span class="hr"><span>'+esc(d.pilote)+' <i style="color:#5b616b;font-style:normal">'+r+'</i>'
          +(d.joker?' <i style="color:var(--amber);font-style:normal">'+esc(nomJk(d.joker))+'</i>':'')
          +'</span><b class="'+dc+'">'+sg(d.bm)+'</b></span>';
      }).join('');
      if(l.voiture){
        var vc=l.voiture.bm<0?'g2':(l.voiture.bm>0?'r2':'');
        h+='<span class="hr"><span><i style="color:var(--amber);font-style:normal">Voiture</i> '
          +esc(l.voiture.modele)+'</span><b class="'+vc+'">'+sg(l.voiture.bm)+'</b></span>';
      }
      h+='<span class="hs">Total spéciale : <b>'+sg(l.delta)+' s</b></span>';
      return '<span class="hint nm-h">'+esc(user)+'<span class="hb">'+h+'</span></span>';
    }
  }
  // sinon : juste la composition
  h+=co.equipages.map(function(e){
    return '<span class="hr"><span>'+esc(e.pilote||e.id)+' <i style="color:#5b616b;font-style:normal">'
      +esc(e.classe||'')+'</i></span><b>'+(e.cout||'')+'</b></span>';
  }).join('');
  h+='<span class="hr"><span><i style="color:var(--amber);font-style:normal">Voiture</i> '+esc(co.voiture)+'</span></span>';
  if(co.jokers&&co.jokers.length)
    h+='<span class="hs">Jokers : '+co.jokers.map(function(j){return esc(nomJk(j.joker))+' ('+esc(j.ss)+')';}).join(', ')+'</span>';
  return '<span class="hint nm-h">'+esc(user)+'<span class="hb">'+h+'</span></span>';
}

function blocClassement(){
  var g=CL.general;
  if(!g.length)return '<h2 class="sec">Classement général</h2><div class="panel"><div class="msg">Aucune écurie engagée pour l\'instant.</div></div>';
  var lead=g[0].total;
  // évolution depuis la dernière spéciale
  var cs=courues(), evol={};
  if(cs.length){
    var last=(CL.generalParSS||{})[cs[cs.length-1].code]||[];
    last.forEach(function(x){evol[x.user]=x.evol;});
  }
  return '<h2 class="sec">Classement général</h2><div class="panel"><table>'
   +'<thead><tr><th></th><th>Écurie</th><th style="text-align:right">Chrono</th><th style="text-align:right">Écart</th>'
   +'<th style="text-align:right">Évol.</th><th style="text-align:right">Pts</th></tr></thead><tbody>'
   +g.map(function(l,i){
     var e=evol[l.user], ev='<span class="ev eq">—</span>';
     if(e!==null&&e!==undefined){
       if(e>0)ev='<span class="ev up">▲'+e+'</span>';
       else if(e<0)ev='<span class="ev dn">▼'+(-e)+'</span>';
       else ev='<span class="ev eq">=</span>';
     }
     return '<tr class="'+(l.user===U?'me ':'')+(i===0?'lead':'')+'"><td class="p">'+l.rang+'</td>'
      +'<td>'+infoJoueur(l.user,null)+'</td>'
      +'<td class="t">'+fmt(l.total)+'</td><td class="e">'+(i===0?'—':ec(l.total-lead))+'</td>'
      +'<td>'+ev+'</td>'
      +'<td class="t" style="color:var(--amber)">'+l.points+'</td></tr>';
   }).join('')+'</tbody></table><div style="margin-top:10px;font-size:11px;color:var(--fog)">'
   +g.length+' écurie'+(g.length>1?'s':'')+' engagée'+(g.length>1?'s':'')+' · barème '
   +(g.length<15?'petit peloton':'pourcentage')+' · évolution depuis la dernière spéciale</div></div>';
}
// Deux classements complets par spéciale : la spéciale, et le général à son issue.
function tablesSS(code){
  var sp=(CL.parSpeciale||{})[code]||[];
  var gn=(CL.generalParSS||{})[code]||[];
  if(!sp.length&&!gn.length)return '';
  return '<div class="tabs" data-tabs>'
    +'<div class="tb on" data-tb="s">Classement de la spéciale</div>'
    +'<div class="tb" data-tb="g">Général à l\'issue</div></div>'
    +'<div class="tv on" data-tv="s">'+tblSpe(sp,code)+'</div>'
    +'<div class="tv" data-tv="g">'+tblGen(gn)+'</div>';
}
function tblSpe(l,code){
  if(!l.length)return '<div class="msg">Aucune écurie classée.</div>';
  return '<table><thead><tr><th></th><th>Écurie</th><th style="text-align:right">Temps</th>'
   +'<th style="text-align:right">Écart</th></tr></thead><tbody>'
   +l.map(function(x,i){
     return '<tr class="'+(x.user===U?'me ':'')+(i===0?'lead':'')+'"><td class="p">'+x.rang+'</td>'
      +'<td>'+infoJoueur(x.user,code)+'</td>'
      +'<td class="t">'+fmt(x.temps)+'</td>'
      +'<td class="e">'+(i===0?'—':ec(x.ecart))+'</td></tr>';
   }).join('')+'</tbody></table>';
}
function tblGen(l){
  if(!l.length)return '<div class="msg">Aucune écurie classée.</div>';
  return '<table><thead><tr><th></th><th>Écurie</th><th style="text-align:right">Chrono</th>'
   +'<th style="text-align:right">Écart</th><th style="text-align:right">Évol.</th></tr></thead><tbody>'
   +l.map(function(x,i){
     var ev='<span class="ev eq">—</span>';
     if(x.evol!==null&&x.evol!==undefined){
       if(x.evol>0)ev='<span class="ev up">▲'+x.evol+'</span>';
       else if(x.evol<0)ev='<span class="ev dn">▼'+(-x.evol)+'</span>';
       else ev='<span class="ev eq">=</span>';
     }
     return '<tr class="'+(x.user===U?'me ':'')+(i===0?'lead':'')+'"><td class="p">'+x.rang+'</td>'
      +'<td>'+infoJoueur(x.user,null)+'</td><td class="t">'+fmt(x.total)+'</td>'
      +'<td class="e">'+(i===0?'—':ec(x.ecart))+'</td>'
      +'<td>'+ev+'</td></tr>';
   }).join('')+'</tbody></table>';
}
function brancherTabs(root){
  var t=root.querySelector('[data-tabs]');if(!t)return;
  Array.prototype.forEach.call(t.querySelectorAll('.tb'),function(b){
    b.onclick=function(ev){
      ev.stopPropagation();
      Array.prototype.forEach.call(t.querySelectorAll('.tb'),function(o){o.classList.remove('on');});
      b.classList.add('on');
      var k=b.getAttribute('data-tb');
      Array.prototype.forEach.call(root.querySelectorAll('[data-tv]'),function(v){
        v.classList.toggle('on',v.getAttribute('data-tv')===k);
      });
    };
  });
}

// ── jokers ───────────────────────────────────────────────────────────────────
function blocJokers(){
  return '<h2 class="sec">Jokers</h2><div class="panel" style="border-left:3px solid var(--amber)">'
   +'<div style="font-size:12px;color:var(--fog);line-height:1.6;margin-bottom:15px">'
   +'Choisis un joker, la <b style="color:var(--amber)">spéciale</b> (encore à disputer) puis l\'<b style="color:var(--amber)">équipage</b> visé. '
   +'Plusieurs jokers peuvent viser une même spéciale, mais jamais deux sur le même équipage. '
   +'Un équipage abandonné ou forfait ne peut pas être ciblé. <b style="color:var(--amber)">'
   +(R.maxJokers-MOI.jokers.length)+' joker(s)</b> encore posable(s).</div>'
   +'<div class="jks" id="jks"></div>'
   +'<div class="pick"><div class="l">Sur quelle spéciale ?</div><div class="row" id="sss"></div></div>'
   +'<div class="pick"><div class="l">Sur quel équipage ?</div><div class="row" id="tgs"></div></div>'
   +'<div id="jerr"></div>'
   +'<div style="display:flex;gap:12px;align-items:center;margin-top:16px;flex-wrap:wrap">'
   +'<button class="btn" id="pose" disabled>Poser le joker</button>'
   +'<span style="font-size:11px;color:var(--fog)" id="jw">Choisis un joker, une spéciale et un équipage.</span>'
   +'</div></div>';
}
function jkUse(id){return MOI.jokers.filter(function(j){return j.joker===id;})[0];}
function jkCouple(ss,eq){return MOI.jokers.some(function(j){return j.ss===ss&&j.equipage===eq;});}
function abandonne(id){
  // hors course = "Fo" quelque part, ou "Ab" sans classement ultérieur
  var ss=(MOI.course&&MOI.course.speciales)||[];
  var last=null;
  for(var i=0;i<ss.length;i++){
    var d=ss[i].detail.filter(function(x){return x.id===id;})[0];
    if(d)last=d.res;
  }
  return last==='Ab'||last==='Fo';
}
function majJk(){
  var jks=document.getElementById('jks');if(!jks)return;
  jks.innerHTML=JK.map(function(j){
    var u=jkUse(j.id);
    return '<div class="jk '+(u?'used ':'')+(J.joker===j.id?'sel':'')+'" data-j="'+j.id+'">'+ICON[j.id]
      +(u?'<span class="bd">'+esc(u.ss)+'</span>':'')
      +'<div class="tip"><div class="t">'+esc(j.t)+'</div><div class="d">'+esc(j.d)+'</div>'
      +(u?'<div class="d" style="color:var(--err);margin-top:5px">Déjà utilisé sur '+esc(u.ss)+'.</div>':'')
      +'</div></div>';
  }).join('');
  Array.prototype.forEach.call(jks.querySelectorAll('.jk'),function(el){
    var j=el.getAttribute('data-j');
    el.onclick=function(ev){
      ev.stopPropagation();
      if(!canHover&&!el.classList.contains('show')){
        Array.prototype.forEach.call(jks.querySelectorAll('.jk'),function(o){o.classList.remove('show');});
        el.classList.add('show');return;
      }
      if(jkUse(j))return;
      J.joker=(J.joker===j?null:j);majJk();
    };
  });

  var sss=document.getElementById('sss');
  sss.innerHTML=R.speciales.map(function(s){
    var n=MOI.jokers.filter(function(j){return j.ss===s.code;}).length;
    return '<div class="sc '+(s.partie||s.courue?'off ':'')+(J.ss===s.code?'sel':'')+'" data-s="'+esc(s.code)+'">'
      +'<div class="c">'+esc(s.code)+'</div><div class="k">'+s.km+' km</div>'
      +(n?'<span class="j">'+n+' joker'+(n>1?'s':'')+'</span>':'')+'</div>';
  }).join('');
  Array.prototype.forEach.call(sss.querySelectorAll('.sc'),function(el){
    var code=el.getAttribute('data-s');
    var s=R.speciales.filter(function(x){return x.code===code;})[0];
    if(s.partie||s.courue)return;
    el.onclick=function(){J.ss=(J.ss===code?null:code);majJk();};
  });

  var tgs=document.getElementById('tgs');
  tgs.innerHTML=MOI.ecurie.equipages.map(function(id){
    var e=eng(id);if(!e)return '';
    var out=abandonne(id), deja=J.ss&&jkCouple(J.ss,id);
    var why=out?'Hors course':(deja?'Joker déjà posé':'');
    return '<div class="tg '+((out||deja)?'off ':'')+(J.tg===id?'sel':'')+'" data-t="'+esc(id)+'">'
      +'<span class="chip cl">'+esc(e.classe)+'</span><span class="p">'+esc(e.pilote)+'</span>'
      +(why?'<span class="why">'+why+'</span>':'')+'</div>';
  }).join('');
  Array.prototype.forEach.call(tgs.querySelectorAll('.tg'),function(el){
    var id=el.getAttribute('data-t');
    if(abandonne(id)||(J.ss&&jkCouple(J.ss,id)))return;
    el.onclick=function(){J.tg=(J.tg===id?null:id);majJk();};
  });

  if(J.tg&&(abandonne(J.tg)||(J.ss&&jkCouple(J.ss,J.tg))))J.tg=null;
  var quota=MOI.jokers.length>=R.maxJokers;
  var ok=J.joker&&J.ss&&J.tg&&!quota;
  document.getElementById('pose').disabled=!ok;
  var w=document.getElementById('jw');
  if(quota)w.textContent='Quota atteint : '+R.maxJokers+' jokers posés sur ce rallye.';
  else if(ok){var e=eng(J.tg);
    w.textContent='« '+nomJk(J.joker)+' » sur '+J.ss+', ciblé sur '+e.pilote+' — verrouillé au départ.';}
  else{var nd=[];if(!J.joker)nd.push('un joker');if(!J.ss)nd.push('une spéciale');if(!J.tg)nd.push('un équipage');
    w.textContent='Choisis '+nd.join(', ')+'.';}
  document.getElementById('pose').onclick=poser;
}
function poser(){
  var b=document.getElementById('pose');b.disabled=true;
  H('/api/crr/joker',{method:'POST',body:{rallye:R.id,joker:J.joker,ss:J.ss,equipage:J.tg}})
  .then(function(d){
    if(!d.ok){document.getElementById('jerr').innerHTML='<div class="msg err">'+esc(d.error)+'</div>';b.disabled=false;return;}
    J={joker:null,ss:null,tg:null};
    return charger();
  }).catch(function(){document.getElementById('jerr').innerHTML='<div class="msg err">Serveur injoignable.</div>';b.disabled=false;});
}
document.addEventListener('click',function(e){
  var j=document.getElementById('jks');
  if(j)Array.prototype.forEach.call(j.querySelectorAll('.jk'),function(o){o.classList.remove('show');});
  // fermer le menu du carrousel si on clique ailleurs
  var cm=document.getElementById('cmenu');
  if(cm&&cm.classList.contains('open')&&!(e.target.closest&&e.target.closest('#cinfo')))cm.classList.remove('open');
  // infobulles : au doigt, un appui les ouvre
  var h=e.target.closest?e.target.closest('.hint'):null;
  Array.prototype.forEach.call(document.querySelectorAll('.hint.show'),function(o){
    if(o!==h)o.classList.remove('show');
  });
  if(h&&!matchMedia('(hover:hover)').matches)h.classList.toggle('show');
});

// hook : après chaque rendu, brancher jokers + dépliage des rallyes de saison
var _r=rendre;
rendre=function(){
  _r();
  if(document.getElementById('jks'))majJk();
  Array.prototype.forEach.call(document.querySelectorAll('.rdh'),function(el){
    el.onclick=function(){el.parentNode.classList.toggle('open');};
  });
};

// ── Actualisation automatique ────────────────────────────────────────────────
// Toutes les 60 s, on redemande l'état au serveur. Si rien n'a changé, on ne
// redessine pas (pour ne pas fermer une infobulle ou perdre une sélection).
var _sig=null, _auto=null;
function signature(){
  return JSON.stringify({
    e:R?R.etat:null,
    c:CL?CL.general.map(function(l){return l.user+':'+l.total;}):null,
    s:R?R.speciales.filter(function(x){return x.courue;}).length:0,
    j:MOI?MOI.jokers.length:0,
    p:CHP&&CHP.classement?CHP.classement.map(function(l){return l.user+':'+l.points;}).join(','):'',
  });
}
function autoMaj(){
  if(document.hidden)return;                       // onglet en arrière-plan : on attend
  if(J.joker||J.ss||J.tg)return;                   // le joueur est en train de poser un joker
  if(S.crews.some(Boolean)||S.car)return;          // ou de composer : on ne l'interrompt pas
  H('/api/crr/rallye').then(function(d){
    if(!d.ok)return;
    return Promise.all([H('/api/crr/moi?rallye='+d.rallye.id), H('/api/crr/classement?rallye='+d.rallye.id), H('/api/crr/championnat')])
      .then(function(res){
        var nR=d.rallye, nCAL=d.calendrier||[];
        var nMOI=res[0].ok?res[0]:MOI, nCL=res[1].ok?res[1]:CL;
        var nCHP=res[2]&&res[2].ok?res[2]:CHP;
        var av=_sig;
        R=nR;CAL=nCAL;MOI=nMOI;CL=nCL;CHP=nCHP;
        var ap=signature();
        if(av!==ap){ _sig=ap; rendre(); majEtat(true); }   // du nouveau : on redessine
        else { majEtat(false); }                            // rien de neuf : on montre le pouls
      });
  }).catch(function(){});
}
function majEtat(change){
  var el=document.getElementById('maj');
  if(!el)return;
  var h=new Date().toLocaleTimeString('fr-FR');
  el.innerHTML='<span class="pulse"></span>Mise à jour automatique · '
    +(change?'nouveautés à ':'vérifié à ')+'<b>'+h+'</b>';
}
document.addEventListener('visibilitychange',function(){ if(!document.hidden) autoMaj(); });

charger().then(function(){
  _sig=signature();
  majEtat();
  if(_auto)clearInterval(_auto);
  _auto=setInterval(autoMaj,60000);
});
</script>
