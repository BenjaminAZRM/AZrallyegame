<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZRALLYEGAME — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#0e1013;
    --card:#15181d;
    --line:#2a2f37;
    --fog:#8b929c;
    --paper:#eceef1;
    --gold:#fbbf24;
    --gold-soft:#ffd77a;
    --red:#dc2626;
    --red-hi:#ef4444;
    --err:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--asphalt);
    color:var(--paper);
    font-family:"Space Mono",monospace;
    min-height:100%;
    display:flex;
    flex-direction:column;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(251,191,36,.06), transparent 42%),
      radial-gradient(circle at 90% 90%, rgba(220,38,38,.05), transparent 45%);
  }
  header{padding:22px 24px;text-align:center;border-bottom:1px solid var(--line)}
  .mark{
    font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.16em;
    text-transform:uppercase;font-size:22px;
  }
  .mark span{color:var(--gold)}

  main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px}
  .card{
    width:100%;max-width:400px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:26px 24px 28px;
  }
  .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:6px}
  h1{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;text-align:center;font-size:26px;letter-spacing:.02em;margin-bottom:22px}

  .tabs{display:flex;gap:6px;margin-bottom:22px;background:#0c0e12;border:1px solid var(--line);border-radius:10px;padding:4px}
  .tab{
    flex:1;text-align:center;padding:9px 6px;border-radius:7px;cursor:pointer;
    font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:13px;
    color:var(--fog);transition:all .15s;user-select:none;
  }
  .tab.on{background:var(--red);color:#fff}

  label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);margin:14px 0 7px}
  input{
    width:100%;background:#0c0e12;border:2px solid var(--line);border-radius:10px;
    padding:13px 14px;font-size:15px;color:var(--paper);outline:none;font-family:"Space Mono",monospace;
    transition:border-color .15s;
  }
  input:focus{border-color:var(--gold)}
  .hint{font-size:11px;color:#5b616b;margin-top:6px}

  .err{min-height:18px;margin:14px 0 2px;font-size:12px;color:var(--err);text-align:center}

  button.submit{
    width:100%;margin-top:10px;background:var(--red);border:2px solid var(--red-hi);border-radius:11px;
    padding:15px;font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    font-size:16px;color:#fff;cursor:pointer;transition:background .15s;
  }
  button.submit:hover{background:var(--red-hi)}
  button.submit:disabled{opacity:.55;cursor:default}

  .swap{text-align:center;margin-top:16px;font-size:12px;color:var(--fog)}
  .swap b{color:var(--gold);cursor:pointer}

  footer{border-top:1px solid var(--line);padding:14px;text-align:center;color:var(--fog);font-size:10px;letter-spacing:.16em;text-transform:uppercase}

  .hidden{display:none}
</style>
</head>
<body>
  <header><div class="mark">AZ<span>RALLYE</span>GAME</div></header>

  <main>
    <div class="card">
      <div class="eyebrow" id="eyebrow">Bienvenue</div>
      <h1 id="h1">Connexion</h1>

      <div class="tabs">
        <div class="tab on" id="tab-login">Se connecter</div>
        <div class="tab" id="tab-register">Créer un compte</div>
      </div>

      <label for="username">Identifiant</label>
      <input id="username" type="text" maxlength="20" autocomplete="username" placeholder="Ton pseudo de pilote">

      <label for="code">Code</label>
      <input id="code" type="password" autocomplete="current-password" placeholder="Ton code secret">

      <div id="confirm-wrap" class="hidden">
        <label for="code2">Confirme le code</label>
        <input id="code2" type="password" autocomplete="new-password" placeholder="Retape ton code">
        <div class="hint">6 caractères minimum. Choisis un code dédié à AZRALLYEGAME (pas un mot de passe important).</div>
      </div>

      <div class="err" id="err"></div>

      <button class="submit" id="submit">Se connecter</button>

      <div class="swap" id="swap"></div>
    </div>
  </main>

  <footer>AZRALLYEGAME — Simulation amateur, non officielle</footer>

<script>
  // Déjà connecté ? → direction le menu des jeux
  try{ if(localStorage.getItem('azr_user') && localStorage.getItem('azr_token')){ location.replace('/menu.html'); } }catch(e){}

  var mode='login';
  var $=function(id){return document.getElementById(id);};
  var err=$('err');

  function setMode(m){
    mode=m;
    var reg=(m==='register');
    $('tab-login').classList.toggle('on',!reg);
    $('tab-register').classList.toggle('on',reg);
    $('confirm-wrap').classList.toggle('hidden',!reg);
    $('h1').textContent=reg?'Créer un compte':'Connexion';
    $('eyebrow').textContent=reg?'Nouveau pilote':'Bienvenue';
    $('submit').textContent=reg?'Créer mon compte':'Se connecter';
    $('code').setAttribute('autocomplete',reg?'new-password':'current-password');
    $('swap').innerHTML=reg
      ? 'Déjà un compte ? <b id="go-login">Se connecter</b>'
      : 'Pas encore de compte ? <b id="go-register">Créer un compte</b>';
    var gl=$('go-login'); if(gl) gl.onclick=function(){setMode('login');};
    var gr=$('go-register'); if(gr) gr.onclick=function(){setMode('register');};
    err.textContent='';
  }
  $('tab-login').onclick=function(){setMode('login');};
  $('tab-register').onclick=function(){setMode('register');};

  async function submit(){
    err.textContent='';
    var username=$('username').value.trim();
    var code=$('code').value;
    if(!username || !code){ err.textContent='Remplis l\u2019identifiant et le code.'; return; }
    if(mode==='register'){
      if(code.length<6){ err.textContent='Code trop court (6 caractères minimum).'; return; }
      if($('code2').value!==code){ err.textContent='Les deux codes ne correspondent pas.'; return; }
    }
    var btn=$('submit'); btn.disabled=true;
    var endpoint=(mode==='register')?'/api/register':'/api/login';
    try{
      var res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,code:code})});
      var data=await res.json();
      if(!res.ok || !data.ok){ err.textContent=(data && data.error) || 'Une erreur est survenue.'; btn.disabled=false; return; }
      try{ localStorage.setItem('azr_user', data.username); localStorage.setItem('azr_token', data.token||''); }catch(e){}
      location.href='/menu.html';
    }catch(e){
      err.textContent='Serveur injoignable. Réessaie dans un instant.';
      btn.disabled=false;
    }
  }
  $('submit').onclick=submit;
  $('code').addEventListener('keydown',function(e){ if(e.key==='Enter' && mode==='login') submit(); });
  $('username').addEventListener('keydown',function(e){ if(e.key==='Enter') $('code').focus(); });

  setMode('login');
</script>
</body>
</html>
