<style>

*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e5e7eb;font-family:'Inter',system-ui,sans-serif}
.hdr{background:linear-gradient(135deg,#1a0a0a 0%,#0a0a1a 100%);border-bottom:2px solid #dc2626;padding:16px 20px;position:sticky;top:0;z-index:10}
.pbar{flex:1;height:4px;border-radius:2px}
.year-block{background:#dc2626;border-radius:10px;padding:8px 18px;text-align:center;flex-shrink:0}
.year-lbl{font-size:10px;color:#fca5a5;text-transform:uppercase;letter-spacing:.1em}
.year-num{font-weight:900;font-size:36px;color:#fff;line-height:1}
.tirage-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;padding:40px 20px;text-align:center}
.step-label{font-size:12px;color:#9ca3af;margin-bottom:10px;text-transform:uppercase;letter-spacing:.12em}
.step-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:32px}
.tirage-btn{display:inline-block;background:#dc2626;border:2px solid #ef4444;border-radius:12px;padding:16px 44px;font-size:17px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 0 28px rgba(220,38,38,.6);transition:all .15s}
.tirage-btn:hover{background:#ef4444;transform:scale(1.04)}
.tirage-btn:disabled{background:#374151;border-color:#4b5563;color:#9ca3af;cursor:default;transform:none;box-shadow:none}
.choose-btn{display:inline-block;background:#7c3aed;border:2px solid #8b5cf6;border-radius:12px;padding:16px 44px;font-size:17px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 0 24px rgba(124,58,237,.5);transition:all .15s}
.choose-btn:hover{background:#8b5cf6;transform:scale(1.04)}
.tirage-sub{font-size:12px;color:#6b7280;margin-top:14px}
.year-reveal{font-size:72px;font-weight:900;color:#fff;line-height:1;margin:20px 0}
.year-reveal.spin{animation:spinIn .6s ease-out forwards}
@keyframes spinIn{0%{opacity:0;transform:scale(.3) rotate(-10deg);color:#dc2626}60%{transform:scale(1.15) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0deg);color:#fff}}
.result-row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:3px;border-radius:6px;border:1px solid #1f2937;animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.you-badge{font-size:9px;background:#7c3aed22;color:#a78bfa;padding:1px 4px;border-radius:3px;margin-left:3px}
.nav{padding:12px 20px;display:flex;gap:8px}
.nav-btn{flex:1;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer}
.fc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:3px;border-radius:6px;border:1px solid #1f2937}
.rallye-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:12px 20px}
.rally-card{background:#0f1117;border:1px solid #1f2937;border-radius:6px;padding:7px 9px}
.stats{display:flex;gap:4px;flex-shrink:0}
.stat{text-align:center;min-width:30px}
.stat-k{font-size:9px;color:#6b7280}
.stat-v{font-size:12px;font-weight:700}

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function rndN(a,n){const c=[...a],r=[];for(let i=0;i<n&&c.length;i++){const x=Math.floor(Math.random()*c.length);r.push(c.splice(x,1)[0]);}return r;}
function sc(e,r){return(e.asp*r.asp+e.ter*r.ter+e.nei*r.nei+e.sec*r.sec+e.plu*r.plu+e.rap*r.rap+e.sin*r.sin)/3;}
function basePerf(d,c,v,r){return((sc(d,r)+sc(c,r)+sc(v,r))/3)*(1+(Math.random()*.1-.05));}
function calcInc(car,r){const risk=(1-car.fib)*(1+r.cas),t=Math.random();if(t>risk)return{type:"OK",pen:0};if(t>risk*.67)return{type:"Crevaison",pen:30};if(t>risk*.33)return{type:"Panne",pen:60};return{type:"Abandon",pen:Infinity};}
function fmtG(s){if(s===0)return"-";if(s>=60){const m=Math.floor(s/60),x=(s%60).toFixed(1);return`+${m}m${x.padStart(4,"0")}s`;}return`+${s.toFixed(1)}s`;}
function scol(s){
  if(s.includes("Neige")&&s.includes("Asp"))return"#94a3b8"; // mixte
  if(s.includes("Neige"))return"#f1f5f9";   // blanc neige
  if(s.includes("Asp"))return"#9ca3af";     // gris asphalte
  return"#a16207";                          // marron terre
}
function scolBg(s){
  if(s.includes("Neige")&&s.includes("Asp"))return"#1e2432";
  if(s.includes("Neige"))return"#1e2432";
  if(s.includes("Asp"))return"#1c1c1e";
  return"#1a1208";
}
function vCol(v){return v>=90?"#f59e0b":v>=85?"#60a5fa":"#9ca3af";}
function coS(d){if(!d)return{asp:80,ter:80,nei:80,sec:80,plu:80,rap:80,sin:80,fib:0.85,nom:""};return{asp:d.casp||80,ter:d.cter||80,nei:d.cnei||80,sec:d.csec||80,plu:d.cplu||80,rap:d.crap||80,sin:d.csin||80,fib:d.cfib||0.85,nom:d.cop||""};}

function init(){ST.phase="rules";ST.draftRound=0;ST.draftOffers=[];ST.rerollUsed=false;ST.riskLevel=null;ST.sel={};render();}

function makeDraftOffers(){
  // Tour 0 = 3 pilotes, Tour 1 = 3 copilotes, Tour 2 = 3 voitures.
  // 3 propositions distinctes, tirées au hasard dans toute l'histoire du WRC.
  const type=ST.draftRound===0?"driver":ST.draftRound===1?"codr":"car";
  const offers=[],seen=new Set();
  let guard=0;
  while(offers.length<3 && guard<300){
    guard++;
    const yr=rnd(YEARS);
    if(type==="driver"){
      const row=rnd(DATA[yr].drivers);
      if(seen.has("d|"+row.nom))continue; seen.add("d|"+row.nom);
      offers.push({type:"driver",nom:row.nom,annee:yr,item:row});
    }else if(type==="codr"){
      const row=rnd(DATA[yr].drivers);
      if(!row.cop||seen.has("c|"+row.cop))continue; seen.add("c|"+row.cop);
      offers.push({type:"codr",nom:row.cop,annee:yr,item:row});
    }else{
      const row=rnd(DATA[yr].cars);
      if(seen.has("v|"+yr+"|"+row.nom))continue; seen.add("v|"+yr+"|"+row.nom);
      offers.push({type:"car",nom:row.nom,annee:yr,item:row});
    }
  }
  return offers;
}

function simulate(){
  const yd=DATA[ST.sel.carYear];
  const carMap={};yd.cars.forEach(c=>{carMap[c.nom]=c;});
  const rivals=yd.drivers.map(d=>{
    const rivalCar=d.voiture?carMap[d.voiture]:null;
    return{id:d.nom,nom:d.nom,cop:d.cop,driver:d,codr:coS(d),car:rivalCar||rnd(yd.cars)};
  });
  if(!ST.sel.driver||!ST.sel.codr||!ST.sel.car){console.error("simulate: missing sel items",ST.sel);return;}
  const riskMods={prudent:{perf:0.95,fib:1.15},normal:{perf:1,fib:1},attaque:{perf:1.08,fib:0.80}};
  const rMod=riskMods[ST.riskLevel||'normal']||riskMods.normal;
  const playerDriver={...ST.sel.driver};
  const playerCar={...ST.sel.car,fib:Math.min(0.99,ST.sel.car.fib*rMod.fib)};
  const player={id:"JOUEUR",nom:ST.sel.driver.nom,cop:ST.sel.codr.nom||"",driver:playerDriver,codr:ST.sel.codr,car:playerCar,isP:true,riskPerfMod:rMod.perf};
  const all=[player,...rivals];
  const champ={};all.forEach(e=>{champ[e.id]=0;});
  ST.results=ST.drawn.map(r=>{
    const comp=all.map(e=>{const p=basePerf(e.driver,e.codr,e.car,r)*(e.riskPerfMod||1),inc=calcInc(e.car,r);return{...e,p,inc,isDNF:inc.type==="Abandon"};});
    let fin=comp.filter(e=>!e.isDNF),dnf=comp.filter(e=>e.isDNF);
    // Si tout le monde abandonne, ressuscite le meilleur performeur
    if(fin.length===0){const best=comp.reduce((a,b)=>a.p>b.p?a:b);best.isDNF=false;best.inc={type:"OK",pen:0};fin=[best];dnf=comp.filter(e=>e!==best);}
    const best=Math.max(...fin.map(e=>e.p));
    fin.forEach(e=>{e.tempsFinal=(best-e.p)*10+e.inc.pen;});
    fin.sort((a,b)=>a.tempsFinal-b.tempsFinal);
    const sorted=[...fin,...dnf];
    sorted.forEach((e,i)=>{e.gap=e.isDNF?Infinity:e.tempsFinal;e.pts=e.isDNF?0:(PTS[i]||0);e.rank=i+1;champ[e.id]=(champ[e.id]||0)+e.pts;});
    return{r,sorted};
  });
  ST.champ=champ;
}

function champSoFar(){
  const map={};
  for(let i=0;i<=ST.cur;i++) ST.results[i].sorted.forEach(e=>{map[e.id]=(map[e.id]||0)+e.pts;});
  return Object.entries(map).map(([id,pts])=>({id,pts})).sort((a,b)=>b.pts-a.pts);
}
function champFinal(){return Object.entries(ST.champ).map(([id,pts])=>({id,pts})).sort((a,b)=>b.pts-a.pts);}

function buildRevealOrder(sorted){
  const player=sorted.find(e=>e.isP);
  const others=[...sorted.filter(e=>!e.isP)];
  for(let i=others.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[others[i],others[j]]=[others[j],others[i]];}
  return[player,...others];
}

}

function makeRow(e,finalRank){return makeRowWithGap(e,finalRank,e.gap);}

function rebuildList(){
  const container=document.getElementById("revealList");
  if(!container)return;
  const sorted=[...revealedEntries].sort((a,b)=>{
    if(a.isDNF&&!b.isDNF)return 1;if(!a.isDNF&&b.isDNF)return -1;return a.rank-b.rank;
  });
  container.innerHTML="";
  sorted.forEach((e,i)=>{const div=makeRow(e,e.isDNF?"DNF":i+1);div.style.animation="none";container.appendChild(div);});
}

function startReveal(instant){
  if(revealTimer)clearInterval(revealTimer);
  ST.revealed=0;ST.revealing=true;
  revealedEntries=[];
  const sorted=ST.results[ST.cur].sorted;
  const total=sorted.length;
  const container=document.getElementById("revealList");
  if(container)container.innerHTML="";
  if(instant){
    revealedEntries=[...sorted];
    ST.revealed=total;ST.revealing=false;
    const PTS_SCALE_I=[25,18,15,12,10,8,6,4,2,1];
    if(container){container.innerHTML="";sorted.forEach((entry,i)=>{const div=makeRowWithGap(entry,entry.isDNF?"DNF":i+1,entry.gap,entry.isDNF?0:(PTS_SCALE_I[i]||0),true);div.style.animation="none";container.appendChild(div);});}
    const ctr=document.getElementById("revealCounter");if(ctr)ctr.textContent="";
    revealNavChamp();return;
  }
  revealOrder=buildRevealOrder(sorted);
  revealTimer=setInterval(()=>{
    const e=revealOrder[ST.revealed];if(!e)return;
    revealedEntries.push(e);ST.revealed++;
    const container=document.getElementById("revealList");
    if(container){
      const PTS_SCALE=[25,18,15,12,10,8,6,4,2,1];
      const finishers=revealedEntries.filter(x=>!x.isDNF).sort((a,b)=>a.rank-b.rank);
      const dnfs=revealedEntries.filter(x=>x.isDNF);
      const toShow=[...finishers,...dnfs];
      const trueWinnerRevealed=finishers.some(x=>x.rank===1);
      const provLeader=finishers[0];
      container.innerHTML="";
      toShow.forEach((entry,i)=>{
        const provRank=entry.isDNF?"DNF":i+1;
        const provPts=entry.isDNF?0:(PTS_SCALE[i]||0);
        let displayGap;
        if(entry.isDNF)displayGap=Infinity;
        else if(trueWinnerRevealed)displayGap=entry.gap;
        else displayGap=entry.gap-provLeader.gap;
        const div=makeRowWithGap(entry,provRank,displayGap,provPts,false);
        if(entry.id===e.id){div.style.animation="fadeIn .4s ease-out";}else{div.style.animation="none";}
        container.appendChild(div);
      });
    }
    const ctr=document.getElementById("revealCounter");
    if(ctr){const reste=total-ST.revealed;ctr.textContent=reste>0?`${reste} équipage${reste>1?"s":""} restant${reste>1?"s":""}...`:""}
    if(ST.revealed>=total){
      clearInterval(revealTimer);revealTimer=null;ST.revealing=false;
      // Rebuild list with allRevealed=true to show "Vainqueur"
      const finalContainer=document.getElementById("revealList");
      if(finalContainer){
        const PTS_FINAL=[25,18,15,12,10,8,6,4,2,1];
        const finishersF=revealedEntries.filter(x=>!x.isDNF).sort((a,b)=>a.rank-b.rank);
        const dnfsF=revealedEntries.filter(x=>x.isDNF);
        finalContainer.innerHTML="";
        [...finishersF,...dnfsF].forEach((entry,i)=>{
          const div=makeRowWithGap(entry,entry.isDNF?"DNF":i+1,entry.gap,entry.isDNF?0:(PTS_FINAL[i]||0),true);
          div.style.animation="none";finalContainer.appendChild(div);
        });
      }
      const ctr2=document.getElementById("revealCounter");if(ctr2)ctr2.textContent="";
      revealNavChamp();
    }
  },700);
}

function selectDraft(offer){
  // Enregistre le choix avec l'année
  if(offer.type==="driver"){ST.sel.driver=offer.item;ST.sel.driverYear=offer.annee;}
  else if(offer.type==="codr"){ST.sel.codr=coS(offer.item);ST.sel.codrYear=offer.annee;}
  else{ST.sel.car=offer.item;ST.sel.carYear=offer.annee;}

  // Si les 3 types sont choisis → lancer la saison
  if(ST.sel.driver&&ST.sel.codr&&ST.sel.car){
    ST.drawn=rndN(RALLYES,10);
    simulate();
    ST.phase="recap";ST.cur=0;ST.revealed=0;ST.maxReached=0;render();return;
  }

  // Sinon tour suivant
  ST.draftRound++;
  ST.draftOffers=makeDraftOffers();
  render();
}

function goToRally(idx){
  if(revealTimer){clearInterval(revealTimer);revealTimer=null;}
  const isNew=idx>ST.maxReached;
  if(isNew)ST.maxReached=idx;
  ST.cur=idx;ST.revealed=0;
  if(isNew){ST.phase="launch";ST.riskLevel=null;render();}
  else{ST.phase="sim";render();startReveal(true);}
}

function render(){
  const app=document.getElementById("app");
  if(ST.phase==="rules"){app.innerHTML=rRules();attachRulesEv();}
  else if(ST.phase==="draft"){app.innerHTML=rDraft();attachDraftEv();}
  else if(ST.phase==="recap"){app.innerHTML=rRecap();attachRecapEv();}
  else if(ST.phase==="launch"){app.innerHTML=rLaunch();attachLaunchEv();}
  else if(ST.phase==="sim"){app.innerHTML=rSim();attachSimEv();}
  else{app.innerHTML=rResults();attachEv();}
}

const KEYS=["asp","ter","nei","sec","plu","rap","sin"];
const LABELS={asp:"Asphalte",ter:"Terre",nei:"Neige",sec:"Sec",plu:"Pluie",rap:"Rapide",sin:"Sinueux"};

function rRecap(){
  const d=ST.sel.driver,c=ST.sel.codr,v=ST.sel.car;

  function getDriverStats(nom,yr){
    const yd=DATA[yr];if(!yd)return null;
    return yd.drivers.find(x=>x.nom===nom)||null;
  }
  function getCopiloteStats(nom,yr){
    const yd=DATA[yr];if(!yd)return null;
    const row=yd.drivers.find(x=>x.cop===nom);
    if(!row)return null;
    return{asp:row.casp,ter:row.cter,nei:row.cnei,sec:row.csec,plu:row.cplu,rap:row.crap,sin:row.csin};
  }
  function getCarStats(nom,yr){
    const yd=DATA[yr];if(!yd)return null;
    return yd.cars.find(x=>x.nom===nom)||null;
  }

  // Récupère les stats avec fallbacks robustes
  const dStats=getDriverStats(d&&d.nom,ST.sel.driverYear)||d||{asp:80,ter:80,nei:80,sec:80,plu:80,rap:80,sin:80};
  const cStats=getCopiloteStats(c&&c.nom,ST.sel.codrYear)||c||{asp:80,ter:80,nei:80,sec:80,plu:80,rap:80,sin:80};
  const vStats=getCarStats(v&&v.nom,ST.sel.carYear)||v||{asp:80,ter:80,nei:80,sec:80,plu:80,rap:80,sin:80};

  // Moyenne des 3 items sur les 7 caractéristiques
  const avg={};
  KEYS.forEach(k=>{
    const dv=Number(dStats[k])||80, cv=Number(cStats[k])||80, vv=Number(vStats[k])||80;
    avg[k]=Math.round((dv+cv+vv)/3);
  });

  // Point fort et faible de l'ensemble
  let best=KEYS[0],worst=KEYS[0];
  KEYS.forEach(k=>{
    if(avg[k]>avg[best])best=k;
    if(avg[k]<avg[worst])worst=k;
  });

  const bloc=(title,nom,annee)=>`
    <div style="background:#0f1117;border:1px solid #1f2937;border-radius:10px;padding:14px 16px;margin-bottom:12px">

  return`<div class="hdr">

      <span class="azbrand">AZ<i>RALLYE</i>GAME</span>

    <div style="display:flex;gap:5px">${[0,1,2].map(()=>`<div class="pbar" style="background:#dc2626"></div>`).join("")}</div>
  </div>
  <div style="padding:16px 20px 24px">
    <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">Votre composition</div>
    <div style="font-weight:800;font-size:20px;color:#fff;margin-bottom:16px">Récapitulatif du draft</div>

    ${bloc("Pilote",d.nom,ST.sel.driverYear)}
    ${bloc("Copilote",c.nom,ST.sel.codrYear)}
    ${bloc("Voiture",v.nom,ST.sel.carYear)}

    <div style="background:#0f1117;border:1px solid #374151;border-radius:10px;padding:14px 16px;margin-bottom:12px">
      <div style="font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px">Force de l'équipage</div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:#0a1a0a;border:1px solid #166534;border-radius:8px;padding:10px 12px">
          <div style="font-size:9px;color:#4ade80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Point fort</div>
          <div style="font-weight:700;font-size:15px;color:#f0fdf4">${LABELS[best]}</div>
          
        </div>
        <div style="flex:1;background:#1a0a0a;border:1px solid #991b1b;border-radius:8px;padding:10px 12px">
          <div style="font-size:9px;color:#f87171;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Point faible</div>

function rSim(){
  const rr=ST.results[ST.cur],{r}=rr;
  const col=scol(r.surface);
  const ca=champSoFar();
  const bars=ST.results.map((_,i)=>`<div class="pbar" style="background:${i<ST.cur?"#dc2626":i===ST.cur?"#ef4444":"#1f2937"};cursor:pointer" data-rally="${i}"></div>`).join("");
  const prevBtn=ST.cur>0?`<button class="nav-btn" style="background:#1f2937;color:#e5e7eb" id="prevR">← Précédent</button>`:"";
  const nextBtn=ST.cur<ST.results.length-1
    ?`<button class="nav-btn" style="background:#dc2626;color:#fff;flex:2" id="nextR">Rallye suivant →</button>`
    :`<button class="nav-btn" style="background:linear-gradient(135deg,#7c3aed,#dc2626);color:#fff;flex:2" id="toResults">🏆 Championnat final</button>`;
  const champRows=ca.map((e,i)=>`
    <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:${i<ca.length-1?"1px solid #111827":"none"};font-size:12px">
      <div style="display:flex;gap:8px;align-items:center">
        <span style="color:#4b5563;width:18px;font-size:11px">${i+1}</span>
        <span style="color:${e.id==="JOUEUR"?"#c4b5fd":"#e5e7eb"};font-weight:${e.id==="JOUEUR"?700:400}">${e.id==="JOUEUR"?(ST.playerName||"Joueur")+" (VOUS)":e.id}</span>
      </div>
      <span style="font-weight:700;color:${e.id==="JOUEUR"?"#c4b5fd":"#60a5fa"}">${e.pts}</span>
    </div>`).join("");

  // Bloc position+points joueur : masqué jusqu'à la fin de la révélation
  const pr=rr.sorted.find(e=>e.isP),isDNF=pr?.isDNF;
  const playerInfo=`
    <div id="playerInfo" style="padding:12px 20px;background:#0f1117;border-bottom:1px solid #1f2937;opacity:0">
      <div style="font-size:11px;color:#9ca3af;margin-bottom:6px">${ST.sel.driver.nom} <span style="color:#4b5563">(${ST.sel.driverYear})</span> · ${ST.sel.codr.nom} <span style="color:#4b5563">(${ST.sel.codrYear})</span> · ${ST.sel.car.nom} <span style="color:#4b5563">(${ST.sel.carYear})</span></div>
      <div style="display:flex;gap:16px;align-items:center">
        <div><span style="font-size:11px;color:#6b7280">Position </span><span style="font-weight:900;font-size:22px;color:${isDNF?"#ef4444":"#f59e0b"}">${isDNF?"DNF":"P"+pr?.rank}</span></div>
        ${pr?.inc?.type&&pr.inc.type!=="OK"?`<div style="background:#1f2937;border-radius:4px;padding:2px 8px;font-size:11px;color:${pr.inc.type==="Abandon"?"#ef4444":"#fbbf24"}">⚠ ${pr.inc.type}</div>`:""}
        <div style="margin-left:auto"><span style="font-size:11px;color:#6b7280">Points </span><span style="font-weight:700;font-size:16px;color:#60a5fa">${pr?.pts||0}</span></div>
      </div>
    </div>`;

  return`<div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="color:#6b7280;font-size:10px;text-transform:uppercase;letter-spacing:.1em">Rallye ${ST.cur+1}/10</div><div style="font-weight:900;font-size:19px;color:#fff">${r.name}</div></div>
      <div style="background:${col}22;border:1px solid ${col};border-radius:4px;padding:2px 8px;font-size:11px;color:${col};font-weight:600">${r.surface}</div>
    </div>
    <div style="display:flex;gap:5px;margin-top:10px">${bars}</div>
  </div>
  ${playerInfo}
  <div style="padding:8px 20px 2px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em">Classement du rallye</div>
    <div id="revealCounter" style="font-size:11px;color:#4b5563;font-style:italic"></div>
  </div>
  <div id="revealList" style="padding:0 20px 8px"></div>
  <div id="simNav" class="nav" style="opacity:0;pointer-events:none">${prevBtn}${nextBtn}</div>
  <div id="champBlock" style="background:#0f1117;border:1px solid #1f2937;border-radius:8px;margin:0 20px 16px;padding:10px 14px;opacity:0">
    <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Championnat ${ST.sel.carYear} — après ${ST.cur+1} rallye${ST.cur>0?"s":""}</div>
    ${champRows}
  </div>`;
}

function attachSimEv(){
  document.querySelectorAll("[data-rally]").forEach(el=>{
    el.addEventListener("click",()=>{if(revealTimer){clearInterval(revealTimer);revealTimer=null;}goToRally(parseInt(el.dataset.rally));});
  });
  const prev=document.getElementById("prevR");if(prev)prev.addEventListener("click",()=>{if(revealTimer){clearInterval(revealTimer);revealTimer=null;}goToRally(ST.cur-1);});
  const next=document.getElementById("nextR");if(next)next.addEventListener("click",()=>{if(revealTimer){clearInterval(revealTimer);revealTimer=null;}goToRally(ST.cur+1);});
  const fin=document.getElementById("toResults");if(fin)fin.addEventListener("click",()=>{ST.phase="results";render();});
}

function rResults(){
  const ca=champFinal(),pRank=ca.findIndex(e=>e.id==="JOUEUR")+1,isChamp=pRank===1,pPts=ST.champ["JOUEUR"]||0;
  const summary=ST.results.map(rr=>{const pr=rr.sorted.find(e=>e.isP),dnf=pr?.isDNF;
    return`<div class="rally-card"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">${rr.r.name}</div>
    <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;font-size:14px;color:${dnf?"#ef4444":pr?.rank===1?"#f59e0b":"#e5e7eb"}">${dnf?"DNF":"P"+pr?.rank}</span><span style="font-size:12px;color:#60a5fa;font-weight:600">${pr?.pts||0} pts</span></div>
    ${pr?.inc?.type&&pr.inc.type!=="OK"?`<div style="font-size:9px;color:${dnf?"#ef4444":"#fbbf24"}">${pr.inc.type}</div>`:""}</div>`;
  }).join("");
  const fullChamp=ca.map((e,i)=>`
    <div class="fc-row" style="background:${e.id==="JOUEUR"?"#1a1020":i===0?"#0f1200":"#0f1117"};border-color:${e.id==="JOUEUR"?"#7c3aed":i===0?"#92400e":"#1f2937"}">
      <span style="width:18px;text-align:right;font-size:12px;font-weight:700;color:#4b5563">${i+1}</span>
      <span style="flex:1;font-size:12px;font-weight:${e.id==="JOUEUR"?700:400};color:${e.id==="JOUEUR"?"#c4b5fd":"#e5e7eb"}">${e.id==="JOUEUR"?(ST.playerName||"Joueur")+" (VOUS)":e.id}</span>
      <span style="font-size:13px;font-weight:700;color:${e.id==="JOUEUR"?"#c4b5fd":"#60a5fa"}">${e.pts}</span>
    </div>`).join("");
  return`<div style="background:${isChamp?"linear-gradient(135deg,#78350f,#1a1a0a)":"linear-gradient(135deg,#1a0a0a,#0a0a1a)"};border-bottom:2px solid #dc2626;padding:28px 20px;text-align:center">
    <div style="font-size:44px;margin-bottom:8px">${isChamp?"🏆":pRank<=3?"🥈":"🏁"}</div>
    <div style="font-weight:900;font-size:24px;color:${isChamp?"#fbbf24":"#fff"}">${isChamp?"CHAMPION DU MONDE !":pRank<=3?pRank+"ème — Podium !":pRank+"ème au championnat"}</div>
    <div style="color:#9ca3af;font-size:12px;margin-top:6px">${ST.sel.driver.nom} / ${ST.sel.codr.nom} — ${ST.sel.car.nom}</div>
    <div style="display:inline-block;background:#1f2937;border-radius:8px;padding:6px 20px;margin-top:14px"><span style="color:#6b7280;font-size:11px">Total </span><span style="font-weight:900;font-size:26px;color:#60a5fa">${pPts} pts</span></div>
  </div>
  <div style="padding:12px 20px 0"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Résumé des rallyes</div></div>
  <div class="rallye-grid">${summary}</div>
  <div style="padding:0 20px"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Classement final championnat ${ST.sel.carYear}</div>${fullChamp}</div>
  <div style="padding:16px 20px 32px"><button id="restart" style="width:100%;background:#dc2626;border:none;border-radius:8px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔄 Nouvelle saison</button></div>`;
}

function attachEv(){
  const tb=document.getElementById("tirageBtn");if(tb)tb.addEventListener("click",()=>{ST.tirageState="spinning";render();setTimeout(()=>{ST.tirageState="revealed";render();},800);});
  const cb=document.getElementById("chooseBtn");if(cb)cb.addEventListener("click",()=>{ST.phase="draft";render();});
  const res=document.getElementById("restart");if(res)res.addEventListener("click",()=>{if(revealTimer){clearInterval(revealTimer);revealTimer=null;}ST={phase:"rules",draftRound:0,draftOffers:[],rerollUsed:false,riskLevel:null,sel:{},drawn:[],results:[],cur:0,champ:{},showNotes:false,revealed:0,revealing:false,maxReached:0,launching:false,playerName:ST.playerName||""};render();});
}
init();
</script>
</body></html>
