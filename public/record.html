/* ---------- MOTEUR (constantes calées) ---------- */
const ENG = {
  wItems:2.0, wSetup:0.3, wPneu:0.3, wRythme:1.0,
  vref:90, pref:80, sCoef:0.4,
  accSeuil:100, multBase:0.95, multK:0.38,
  flouBase:5, flouDiff:8, flouFib:24,
  FLOOR:70,
  tyres:{
    tendre:{base:97,seuil:10,mort:20,label:'Tendre',col:'#f87171'},
    medium:{base:87,seuil:20,mort:36,label:'Médium',col:'#fbbf24'},
    dur:{base:84,seuil:30,mort:70,label:'Dur',col:'#38bdf8'}
  }
};
const ck=['asph','terre','neige','rap','sin','bos','lisse'];
function noteOn(e,st){let s=0;ck.forEach(k=>s+=e[k]*st[k]);return s/300;}
function tyreAt(km,c){const co=(c.base-ENG.FLOOR)/Math.max(0.5,c.mort-c.seuil);return Math.max(ENG.FLOOR,Math.min(100,c.base-co*Math.max(0,km-c.seuil)));}
function tyreNote(key,km,p){const b=ENG.tyres[key],pe=(p||0)*(p||0);const c={base:b.base,seuil:b.seuil,mort:b.mort};if(key==='tendre'){c.seuil+=4*pe;c.mort+=4*pe;}else if(key==='medium'){c.seuil+=2*pe;c.mort+=2*pe;}else if(key==='dur'){c.base-=4*pe;}const N=60;let s=0;for(let i=0;i<=N;i++)s+=tyreAt(i/N*km,c);return s/(N+1);}

function computeStage(st, crew, car, tyreKey, rythme, setupRap, setupBos){
  const pTyre=(st.humid||0)/100;                                   // pneu : 0/0.5/0.75/1
  const pRain=st.humid>=100?0.6:st.humid>=75?0.4:st.humid>=50?0.2:0; // coef pluie : 0/0.2/0.4/0.6
  const rain=((crew.pluie||0)+(car.pluie||0))*pRain;
  const items=(noteOn(crew,st)+noteOn(car,st))/2 + rain;
  const rRap=100-Math.abs(st.rap-setupRap);
  const rBos=100-Math.abs(st.bos-setupBos);
  const setup=(rRap+rBos)/2;
  const pneu=tyreNote(tyreKey,st.km,pTyre);
  const rythmeNote=80+(rythme/100)*20;
  const score=(ENG.wItems*items+ENG.wSetup*setup+ENG.wPneu*pneu+ENG.wRythme*rythmeNote)/(ENG.wItems+ENG.wSetup+ENG.wPneu+ENG.wRythme);
  const vitesse=ENG.vref+(score-ENG.pref)*ENG.sCoef;
  const baseTime=(3600/vitesse)*st.km;
  const mult=ENG.multBase+(st.diff/100)*ENG.multK;
  const accPts=rythme*mult;
  const flou=ENG.flouBase+(st.diff/100)*ENG.flouDiff+((100-crew.fib)/100)*ENG.flouFib;
  return {items,setup,pneu,rythmeNote,score,vitesse,baseTime,mult,accPts,flou};
}

/* ---------- STOCKAGE (serveur, avec cache mémoire) ---------- */
const Store=(()=>{
  let mem={};
  function get(k){try{const v=localStorage.getItem(k);return v;}catch(e){return mem[k]||null;}}
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
  let _runs=[]; // cache des essais du serveur (rempli au chargement)
  return {
    runs(){return _runs;},
    // Récupère tous les essais déjà enregistrés (tous les joueurs)
    async load(){
      try{
        const res=await fetch('/api/records',{cache:'no-store'});
        const data=await res.json();
        _runs=Array.isArray(data)?data:[];
      }catch(e){_runs=[];}
    },
    // Ajoute un essai : visible tout de suite en local + envoyé au serveur (identité vérifiée par le jeton)
    addRun(r){
      _runs.push(r);
      try{
        var tok=''; try{tok=localStorage.getItem('azr_token')||'';}catch(e){}
        fetch('/api/records',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},body:JSON.stringify(r)})
          .then(function(res){ if(res.status===401){ try{localStorage.removeItem('azr_user');localStorage.removeItem('azr_token');}catch(e){} } })
          .catch(function(){});
      }catch(e){}
    },
    lastName(){return get('azr_name')||'';},
    saveName(n){set('azr_name',n);}
  };
})();

/* ---------- HELPERS ---------- */
function fmtTime(s){const sign=s<0?'-':'';s=Math.abs(s);const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const sec=s-h*3600-m*60;if(h>0)return sign+h+':'+String(m).padStart(2,'0')+':'+sec.toFixed(1).padStart(4,'0');return sign+m+':'+sec.toFixed(1).padStart(4,'0');}
function fmtGap(s){const sg=s>=0?'+':'−';s=Math.abs(s);if(s<60)return sg+s.toFixed(1)+'s';const m=Math.floor(s/60);return sg+m+':'+(s-m*60).toFixed(1).padStart(4,'0');}
function fmtGapShort(s){if(s<60)return s.toFixed(1)+'s';const m=Math.floor(s/60);return m+':'+(s-m*60).toFixed(1).padStart(4,'0');}
function fmtPerson(p){const particles=['al','de','van','von','der','del','di','da','le','la','du'];const parts=p.trim().split(' ');let sur=[parts.pop()];while(parts.length&&particles.includes(parts[parts.length-1].toLowerCase()))sur.unshift(parts.pop());return sur.join(' ').toUpperCase()+(parts.length?' '+parts.join(' '):'');}
function fmtCrew(nom){return nom.split(' - ').map(fmtPerson).join(' - ');}
function surfaceOf(st){
  if(st.neige>=50&&st.asph>0)return {cls:'neige',txt:'Asphalte + neige (mixte)'};
  if(st.neige>=50)return {cls:'neige',txt:'Neige'};
  if(st.terre>=50)return {cls:'terre',txt:'Terre'};
  return {cls:'asph',txt:'Asphalte'};
}
function weatherOf(st){
  const h=st.humid||0;
  if(h>=100)return{cls:'wx-d',txt:'Détrempé'};
  if(h>=75)return{cls:'wx-m',txt:'Mouillé'};
  if(h>=50)return{cls:'wx-h',txt:'Humide'};
  return{cls:'wx-s',txt:'Sec'};
}
function speedDesc(r){return r>=80?'très rapide':r>=65?'rapide':r>=55?'plutôt rapide':r>=45?'équilibré':r>=35?'plutôt sinueux':r>=20?'sinueux':'très sinueux';}
function reliefDesc(b){return b>=70?'très cassante':b>=55?'cassante':b>=45?'moyenne':b>=30?'plutôt lisse':'lisse';}
function tierOf(pts){if(pts>120)return{name:'Sortie de route',pen:30,col:'#dc2626'};if(pts>110)return{name:'Tête à queue',pen:20,col:'#f97316'};if(pts>ENG.accSeuil)return{name:'Tout droit',pen:10,col:'#fbbf24'};return{name:null,pen:0,col:'#6f6f78'};}
const app=()=>document.getElementById('app');
function windowedBoard(entries){
  const n=entries.length;const leader=entries[0]?entries[0].value:0;const meIdx=entries.findIndex(e=>e.me);
  const show=new Set([0]);for(let i=meIdx-5;i<=meIdx+5;i++){if(i>=0&&i<n)show.add(i);}
  const idxs=[...show].sort((a,b)=>a-b);let html='',prev=-1;
  idxs.forEach(i=>{
    if(i-prev>1)html+=`<div class="lb" style="opacity:.35;justify-content:center">⋯</div>`;
    const e=entries[i];const gap=i===0?'':`<span class="small" style="color:#8a8a92;margin-left:8px">+${fmtGapShort(e.value-leader)}</span>`;
    html+=`<div class="lb ${e.me?'me':''}"><span>${i+1}. ${e.name}</span><b>${fmtTime(e.value)}${gap}</b></div>`;prev=i;
  });
  return html;
}
function stageEntries(idx,myTime){
  const arr=Store.runs().filter(r=>r.splits.length>idx).map(r=>({name:r.name,value:r.splits[idx],me:false}));
  arr.push({name:G.name,value:myTime,me:true});arr.sort((a,b)=>a.value-b.value);return arr;
}
function cumEntries(idx,myCum){
  const arr=Store.runs().filter(r=>r.splits.length>idx).map(r=>{let c=0;for(let i=0;i<=idx;i++)c+=r.splits[i];return{name:r.name,value:c,me:false};});
  arr.push({name:G.name,value:myCum,me:true});arr.sort((a,b)=>a.value-b.value);return arr;
}

          <div id="riskSolid" class="rsolid"></div>
          <div id="riskHatch" class="rhatch"></div>
          <div id="riskSeuil" class="rseuil"></div>
        </div>
        <div class="small" style="margin-top:6px;font-size:.68rem;color:#7a7a82">Le trait blanc = seuil d'erreur de pilotage. La zone hachurée est incertaine.</div>
      </div>
      <div class="setblock">
        <label>Transmission</label>
        <input type="range" id="setRap" min="0" max="100" step="1" value="${G.sel.setupRap}">
        <div class="ends"><span>Sinueux</span><span>Rapide</span></div>
      </div>
      <div class="setblock">
        <label>Suspension</label>
        <input type="range" id="setBos" min="0" max="100" step="1" value="${G.sel.setupBos}">
        <div class="ends"><span>Lisse</span><span>Bosselé</span></div>
      </div>
      <div class="small">Règle au plus proche du caractère de la spéciale (tu n'as que la description, à toi de juger).</div>
    </div>

    <button class="btn-primary launch-btn" id="launch" disabled>
      <span class="leds"><i data-k="crew"></i><i data-k="car"></i><i data-k="tyre"></i><i data-k="rythme"></i><i data-k="trans"></i><i data-k="susp"></i></span>
      <span id="launchLabel">Choisis un équipage et une voiture</span>
    </button>
    <div class="foot">Temps cumulé : ${fmtTime(G.cum)}</div>`;

  G.touched={tyre:false,rythme:false,trans:false,susp:false};
  renderCrewList('');renderCarList('');renderTyres();
  document.getElementById('crewSearch').oninput=e=>renderCrewList(e.target.value);
  document.getElementById('carSearch').oninput=e=>renderCarList(e.target.value);
  const bind=(id,key,tk)=>{const el=document.getElementById(id);el.oninput=()=>{G.sel[key]=+el.value;if(tk)G.touched[tk]=true;updateLaunch();if(id==='rythme')updateRisk();};};
  bind('rythme','rythme','rythme');bind('setRap','setupRap','trans');bind('setBos','setupBos','susp');
  document.getElementById('launch').onclick=launchStage;
  updateLaunch();updateRisk();
}

function pilotKey(nom){return fmtPerson(nom.split(' - ')[0]);}
function renderCrewList(filter){
  const box=document.getElementById('crewList');const f=filter.toLowerCase();
  box.innerHTML=DATA.crews.filter(c=>c.nom.toLowerCase().includes(f)).slice().sort((a,b)=>pilotKey(a.nom).localeCompare(pilotKey(b.nom),'fr')).map(c=>{
    const used=G.usedCrews.has(c.nom);const sel=G.sel.crew&&G.sel.crew.nom===c.nom;
    return `<div class="pick ${used?'used':''} ${sel?'sel':''}" data-crew="${c.nom.replace(/"/g,'&quot;')}">
      <span>${fmtCrew(c.nom)}</span></div>`;
  }).join('')||'<div class="pick" style="opacity:.5">Aucun résultat</div>';
  box.querySelectorAll('.pick[data-crew]').forEach(el=>el.onclick=()=>{
    const name=el.getAttribute('data-crew');if(G.usedCrews.has(name))return;
    G.sel.crew=DATA.crews.find(c=>c.nom===name);renderCrewList(filter);
    document.getElementById('crewPick').textContent='✓ '+fmtCrew(G.sel.crew.nom);document.getElementById('crewPick').style.color='#4ade80';
    updateLaunch();updateRisk();
  });
}
function renderCarList(filter){
  const box=document.getElementById('carList');const f=filter.toLowerCase();
  box.innerHTML=DATA.cars.map((c,idx)=>({c,idx})).filter(o=>(o.c.nom+' '+o.c.cat).toLowerCase().includes(f)).map(({c,idx})=>{
    const used=G.usedCars.has(idx);const sel=G.sel.carId===idx;
    return `<div class="pick ${used?'used':''} ${sel?'sel':''}" data-id="${idx}">
      <span>${c.nom}</span><span class="stat">${c.cat.split(' (')[0]}</span></div>`;
  }).join('')||'<div class="pick" style="opacity:.5">Aucun résultat</div>';
  box.querySelectorAll('.pick[data-id]').forEach(el=>el.onclick=()=>{
    const idx=+el.getAttribute('data-id');if(G.usedCars.has(idx))return;
    G.sel.car=DATA.cars[idx];G.sel.carId=idx;renderCarList(filter);
    document.getElementById('carPick').textContent='✓ '+G.sel.car.nom+' ('+G.sel.car.cat.split(' (')[0]+')';document.getElementById('carPick').style.color='#4ade80';
    updateLaunch();
  });
}
function renderTyres(){
  const st=DATA.stages[G.idx];const box=document.getElementById('tyres');
  const rainHint={tendre:['rh-plus','plus endurant sous la pluie'],medium:['rh-plus','plus endurant sous la pluie'],dur:['rh-moins','moins performant sous la pluie']};
  box.innerHTML=Object.keys(ENG.tyres).map(k=>{
    const t=ENG.tyres[k];const sel=G.sel.tyre===k;const[cls,txt]=rainHint[k];
    return `<div class="tyre ${k} ${sel?'sel':''}" data-tyre="${k}">${t.label}<small>usure dès ≈ ${t.seuil} km <i>(sur le sec)</i><br><span class="${cls}">${txt}</span></small></div>`;
  }).join('');
  box.querySelectorAll('.tyre').forEach(el=>el.onclick=()=>{G.sel.tyre=el.getAttribute('data-tyre');G.touched.tyre=true;renderTyres();updateLaunch();});
  document.getElementById('tyreInfo').textContent="Sous la pluie, les gommes tendres s'usent moins vite : elles restent bonnes plus longtemps, alors que le dur perd de son mordant.";
}
function updateRisk(){
  const solid=document.getElementById('riskSolid');if(!solid)return;
  const hatch=document.getElementById('riskHatch');
  const st=DATA.stages[G.idx], crew=G.sel.crew, GMAX=150;
  const pos=v=>Math.max(0,Math.min(100,v/GMAX*100));
  document.getElementById('riskSeuil').style.left=pos(ENG.accSeuil)+'%';
  if(!crew){solid.style.width='0%';hatch.style.width='0%';return;}
  const mult=ENG.multBase+(st.diff/100)*ENG.multK;
  const pts=G.sel.rythme*mult;
  const flou=ENG.flouBase+(st.diff/100)*ENG.flouDiff+((100-crew.fib)/100)*ENG.flouFib;
  const seed=(st.diff*7+crew.fib*13+17)%100;
  const frac=0.15+(seed/100)*0.60;
  const solidEnd=Math.max(0,pts-flou*frac);
  const hatchEnd=Math.min(GMAX,pts+flou*(1-frac));
  solid.style.width=pos(solidEnd)+'%';
  hatch.style.left=pos(solidEnd)+'%';
  hatch.style.width=Math.max(0,pos(hatchEnd)-pos(solidEnd))+'%';
}
function updateLaunch(){
  const s=G.sel,t=G.touched||{};
  const states={crew:!!s.crew,car:!!s.car,tyre:!!t.tyre,rythme:!!t.rythme,trans:!!t.trans,susp:!!t.susp};
  document.querySelectorAll('#launch .leds i').forEach(led=>led.classList.toggle('on',!!states[led.dataset.k]));
  const done=Object.values(states).filter(Boolean).length;
  const ok=done===6;
  const b=document.getElementById('launch');if(b)b.disabled=!ok;
  const lbl=document.getElementById('launchLabel');if(lbl)lbl.textContent=ok?'PARTEZ ›››':('Complète tes choix — '+done+'/6');
}

/* ---------- LANCEMENT & RÉSULTAT ---------- */
function launchStage(){
  const st=DATA.stages[G.idx];const s=G.sel;
  const c=computeStage(st,s.crew,s.car,s.tyre,s.rythme,s.setupRap,s.setupBos);
  const tier=tierOf(c.accPts);
  const stageTime=c.baseTime+tier.pen;
  G.cum+=stageTime;G.splits.push(stageTime);
  G.usedCrews.add(s.crew.nom);G.usedCars.add(s.carId);
  G.results.push({st,crew:s.crew,car:s.car,tyre:s.tyre,c,tier,stageTime});
  screenResult(G.results[G.results.length-1]);
}

function provisionalRank(stageIdx,cum){
  const runs=Store.runs().filter(r=>r.splits.length>stageIdx);
  let better=0;
  runs.forEach(r=>{let cu=0;for(let i=0;i<=stageIdx;i++)cu+=r.splits[i];if(cu<cum)better++;});
  return {rank:better+1,total:runs.length+1};
}

function screenResult(r){
  const last=G.idx===DATA.stages.length-1;
  const sEnt=stageEntries(G.idx,r.stageTime);
  const cEnt=cumEntries(G.idx,G.cum);
  const sPos=sEnt.findIndex(e=>e.me)+1, cPos=cEnt.findIndex(e=>e.me)+1;
  app().innerHTML=`
    <div class="card">
      <div class="small">${r.st.rallye} · ${r.st.nom} (${r.st.km.toFixed(1)} km)</div>
      <div class="big-time">${fmtTime(r.stageTime)}</div>
      <div class="small">${r.c.vitesse.toFixed(1)} km/h de moyenne</div>
      ${r.tier.pen>0?`<div style="margin-top:10px"><span class="pill" style="background:${r.tier.col}22;color:${r.tier.col}">⚠ ${r.tier.name} +${r.tier.pen}s</span></div>`:''}
      <div class="small" style="margin-top:10px">${r.crew.nom.split(' - ')[0]} · ${r.car.nom} · ${ENG.tyres[r.tyre].label}</div>
    </div>
    <h2>Classement de la spéciale — ${sPos}${sPos===1?'er':'e'} sur ${sEnt.length}</h2>
    <div class="card" style="padding:6px 14px">${windowedBoard(sEnt)}</div>
    <h2>Classement général — ${cPos}${cPos===1?'er':'e'} sur ${cEnt.length}</h2>
    <div class="card" style="padding:6px 14px">${windowedBoard(cEnt)}</div>
    <button class="btn-primary" id="next">${last?'Voir le classement final':'Spéciale suivante'}</button>`;
  document.getElementById('next').onclick=()=>{
    if(last){finishGame();}
    else{G.idx++;G.sel={crew:null,car:null,carId:null,tyre:null,rythme:55,setupRap:50,setupBos:50};screenStage();}
  };
}

/* ---------- FIN ---------- */
function finishGame(){
  Store.addRun({name:G.name,total:G.cum,splits:G.splits.slice(),date:Date.now()});
  screenFinal();
}
function leaderboardCard(meTotal){
  const runs=Store.runs().slice().sort((a,b)=>a.total-b.total).slice(0,10);
  if(runs.length===0)return `<h2>Classement</h2><div class="card"><div class="small">Aucun temps enregistré pour l'instant. Sois le premier !</div></div>`;
  const leadT=runs[0]?runs[0].total:0;
  let rows='';runs.forEach((r,i)=>{
    const me=meTotal!==null&&Math.abs(r.total-meTotal)<0.05;
    const gap=i===0?'':`<span class="small" style="color:#8a8a92;margin-left:8px">+${fmtGapShort(r.total-leadT)}</span>`;
    rows+=`<div class="lb ${me?'me':''}"><span>${i+1}. ${r.name}</span><b>${fmtTime(r.total)}${gap}</b></div>`;
  });
  return `<h2>Classement — meilleurs temps</h2><div class="card" style="padding:6px 14px">${rows}</div>`;
}
function screenFinal(){
  const runs=Store.runs().slice().sort((a,b)=>a.total-b.total);
  const myIdx=runs.findIndex(r=>Math.abs(r.total-G.cum)<0.05&&r.name===G.name);
  const leadT=runs[0]?runs[0].total:0;
  let rows='';runs.forEach((r,i)=>{const me=i===myIdx;const gap=i===0?'':`<span class="small" style="color:#8a8a92;margin-left:8px">+${fmtGapShort(r.total-leadT)}</span>`;rows+=`<div class="lb ${me?'me':''}"><span>${i+1}. ${r.name}</span><b>${fmtTime(r.total)}${gap}</b></div>`;});
  app().innerHTML=`
    <div class="brand"><span class="az">Rallye</span> <span class="r">terminé</span></div>
    <div class="card" style="text-align:center;margin-top:12px">
      <div class="small">${G.name} — temps total</div>
      <div class="big-time">${fmtTime(G.cum)}</div>
      <div style="margin-top:8px"><span class="pill" style="background:#fbbf2422;color:#fbbf24">${myIdx+1}${myIdx===0?'er':'e'} sur ${runs.length}</span></div>
    </div>
    <h2>Classement final — tous les finishers (${runs.length})</h2>
    <div class="card" style="padding:6px 14px;max-height:55vh;overflow-y:auto">${rows}</div>
    <button class="btn-primary" id="replay">Rejouer</button>
    <button class="btn-ghost" id="splits" style="width:100%;margin-top:8px">Voir mes temps par spéciale</button>
    <div class="foot">AZRALLYEGAME — Simulation amateur, non officielle.</div>`;
  document.getElementById('replay').onclick=()=>Store.load().then(screenHome);
  document.getElementById('splits').onclick=()=>{
    let h='<h2>Mes spéciales</h2><div class="card" style="padding:6px 14px">';
    G.results.forEach((r,i)=>{
      const times=Store.runs().filter(x=>x.splits.length>i).map(x=>x.splits[i]);
      const y=times.length;const pos=times.filter(t=>t<r.stageTime-0.0001).length+1;
      h+=`<div class="lb"><span>${i+1}. ${r.st.nom}</span><b>${fmtTime(r.stageTime)} <span class="small" style="color:#a78bfa">${pos}ᵉ/${y}</span></b></div>`;
    });
    h+='</div>';
    document.getElementById('splits').insertAdjacentHTML('beforebegin',h);
    document.getElementById('splits').remove();
  };
}

var AZUSER=''; try{ AZUSER=localStorage.getItem('azr_user')||''; }catch(e){}
if(!AZUSER){ location.replace('/'); } else { Store.load().then(screenHome); }
</script>
